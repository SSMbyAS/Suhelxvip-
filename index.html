<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMMbyAS - Wallet & Services</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #3b82f6; --bg: #f3f4f6; --card: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 15px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        
        /* Wallet Display */
        .wallet-card { width: 100%; max-width: 450px; background: var(--card); padding: 20px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; border-left: 5px solid #22c55e; }
        .balance-info h2 { margin: 0; font-size: 28px; color: #1e293b; }
        .balance-info p { margin: 0; font-size: 12px; color: #64748b; font-weight: bold; }

        .section-card { background: var(--card); padding: 20px; border-radius: 15px; width: 100%; max-width: 450px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; box-sizing: border-box; }
        h3 { margin-top: 0; font-size: 16px; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px; color: var(--primary); }
        
        label { display: block; margin: 10px 0 5px; font-size: 12px; font-weight: bold; color: #475569; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; margin-bottom: 10px; box-sizing: border-box; outline: none; }
        
        #qr-display { display: none; text-align: center; background: #f0fdf4; padding: 15px; border-radius: 10px; border: 1px dashed #22c55e; margin-bottom: 10px; }
        .qr-img { width: 180px; border: 4px solid white; margin: 10px 0; }
        
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px; }
        .btn-add { background: #22c55e; color: white; }
        .btn-order { background: var(--primary); color: white; }
        .btn:disabled { background: #cbd5e1; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="wallet-card">
        <div class="balance-info">
            <p>TOTAL BALANCE</p>
            <h2 id="currentBalance">₹0.00</h2>
        </div>
        <i class="fas fa-wallet fa-2x" style="color: #22c55e;"></i>
    </div>

    <div class="section-card">
        <h3><i class="fas fa-plus-circle"></i> Add Funds</h3>
        <label>Amount (₹)</label>
        <input type="number" id="addAmt" placeholder="Min ₹10" oninput="showAddQR()">
        
        <div id="qr-display">
            <p style="font-size:11px;">Scan & Pay to <b>7388720012@fam</b></p>
            <img id="qrImg" class="qr-img" src="">
            <input type="text" id="addUtr" placeholder="Enter 12 Digit UTR">
            <button class="btn btn-add" onclick="validateFunds()">Confirm Add Money</button>
        </div>
    </div>

    <div class="section-card">
        <h3><i class="fas fa-shopping-bag"></i> Place Order</h3>
        <label>Target Link</label>
        <input type="text" id="link" placeholder="Paste link here...">
        
        <label>Category</label>
        <select id="category" onchange="loadServices()">
            <option value="">-- Select Platform --</option>
            <option value="ig">Instagram Services</option>
            <option value="yt">YouTube Services</option>
            <option value="tg">Telegram Services</option>
        </select>

        <label>Service</label>
        <select id="serviceSelect" onchange="checkWallet()">
            <option value="">Select Category First</option>
        </select>

        <div id="priceInfo" style="margin: 10px 0; font-weight: bold; font-size: 14px;"></div>
        <button class="btn btn-order" id="orderBtn" onclick="placeOrder()">Order with Wallet</button>
    </div>

    <script>
        // Data and Balance Initialization
        const serviceData = {
            "ig": [
                {name: "Instagram Views (10k)", price: 4},
                {name: "Instagram Likes (1k)", price: 10},
                {name: "Instagram Followers (1k)", price: 35}
            ],
            "yt": [
                {name: "YouTube Subscribers (1k)", price: 150},
                {name: "YouTube Views (1k)", price: 80},
                {name: "YouTube Likes (1k)", price: 15}
            ],
            "tg": [
                {name: "Telegram Members (1k)", price: 30},
                {name: "Telegram Post Views (1k)", price: 5}
            ]
        };

        let balance = parseFloat(localStorage.getItem('userWallet')) || 0.00;
        document.getElementById('currentBalance').innerText = "₹" + balance.toFixed(2);

        function showAddQR() {
            let amt = document.getElementById('addAmt').value;
            let display = document.getElementById('qr-display');
            if(amt >= 10) {
                display.style.display = "block";
                document.getElementById('qrImg').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=7388720012@fam%26am=${amt}%26cu=INR`;
            } else {
                display.style.display = "none";
            }
        }

        function validateFunds() {
            let utr = document.getElementById('addUtr').value;
            let amt = parseFloat(document.getElementById('addAmt').value);
            if(utr.length < 12) return alert("Sahi 12-digit UTR daalo!");

            balance += amt;
            localStorage.setItem('userWallet', balance);
            document.getElementById('currentBalance').innerText = "₹" + balance.toFixed(2);
            
            alert(`₹${amt} Success! Aapka balance update ho gaya.`);
            document.getElementById('qr-display').style.display = "none";
            document.getElementById('addAmt').value = "";
        }

        function loadServices() {
            const cat = document.getElementById("category").value;
            const sSelect = document.getElementById("serviceSelect");
            sSelect.innerHTML = '<option value="">-- Select Package --</option>';
            if(cat && serviceData[cat]) {
                serviceData[cat].forEach(s => {
                    let opt = document.createElement("option");
                    opt.value = s.price;
                    opt.text = `${s.name} - ₹${s.price}`;
                    sSelect.add(opt);
                });
            }
        }

        function checkWallet() {
            let price = parseFloat(document.getElementById('serviceSelect').value);
            let info = document.getElementById('priceInfo');
            if(!price) return info.innerText = "";
            
            if(price > balance) {
                info.style.color = "red";
                info.innerText = `Paisa kam hai! (Price: ₹${price})`;
            } else {
                info.style.color = "green";
                info.innerText = `Wallet ready! (Cost: ₹${price})`;
            }
        }

        function placeOrder() {
            let price = parseFloat(document.getElementById('serviceSelect').value);
            let link = document.getElementById('link').value;

            if(!price) return alert("Service toh select karo!");
            if(!link) return alert("Link copy karke paste karo!");

            if(balance >= price) {
                balance -= price;
                localStorage.setItem('userWallet', balance);
                document.getElementById('currentBalance').innerText = "₹" + balance.toFixed(2);
                
                alert("Order Successful! Paisa wallet se kat gaya. ✅");
                location.reload();
            } else {
                alert("Wallet balance kam hai, pehle Add Funds karein!");
            }
        }
    </script>
</body>
</html>
