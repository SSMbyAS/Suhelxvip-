<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMMbyAS - Ultimate Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #4f46e5; --secondary: #ec4899; --bg: #f8fafc; --success: #10b981; --warning: #f59e0b; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; padding: 0; color: #1e293b; }
        .screen { display: none; width: 100%; max-width: 500px; margin: 0 auto; min-height: 100vh; background: #fff; position: relative; }
        .active { display: block; }

        /* Login/Signup Design */
        .auth-header { padding: 60px 30px 20px; text-align: center; background: linear-gradient(45deg, var(--primary), var(--secondary)); color: white; border-radius: 0 0 40px 40px; }
        .auth-form { padding: 30px; margin-top: -30px; }
        
        /* Dash Boxes */
        .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; }
        .box { padding: 15px; border-radius: 20px; color: white; position: relative; overflow: hidden; }
        .box-full { grid-column: span 2; background: linear-gradient(135deg, #6366f1, #8b5cf6); }
        .box-bal { background: linear-gradient(135deg, #10b981, #34d399); }
        .box-spent { background: linear-gradient(135deg, #f59e0b, #fb923c); }
        
        /* Inputs & Buttons */
        input, select { width: 100%; padding: 15px; border-radius: 15px; border: 1.5px solid #e2e8f0; margin-bottom: 15px; box-sizing: border-box; font-family: inherit; }
        .btn-main { width: 100%; padding: 16px; border-radius: 15px; border: none; background: var(--primary); color: white; font-weight: 800; cursor: pointer; box-shadow: 0 4px 12px rgba(79,70,229,0.3); }
        .btn-ghost { width: 100%; padding: 12px; background: none; border: 1.5px solid var(--primary); color: var(--primary); border-radius: 15px; font-weight: 700; margin-top: 10px; cursor: pointer; }

        /* Admin Table */
        .admin-table-container { overflow-x: auto; padding: 10px; }
        .adm-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .adm-table th { background: #f1f5f9; padding: 10px; text-align: left; }
        .adm-table td { padding: 10px; border-bottom: 1px solid #eee; }

        /* Nav */
        .bottom-nav { display: flex; background: #fff; padding: 10px 0; border-top: 1px solid #eee; position: fixed; bottom: 0; width: 100%; max-width: 500px; }
        .nav-item { flex: 1; text-align: center; font-size: 10px; font-weight: 700; color: #94a3b8; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { display: block; font-size: 20px; margin-bottom: 2px; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active">
        <div class="auth-header">
            <h1 style="margin:0;">SMMbyAS</h1>
            <p style="opacity:0.8;">Smart Panel for Smart Users</p>
        </div>
        <div class="auth-form">
            <div class="card" style="background:white; padding:25px; border-radius:25px; box-shadow:0 10px 25px rgba(0,0,0,0.05);">
                <input type="text" id="l-user" placeholder="Username">
                <input type="password" id="l-pass" placeholder="Password">
                <button class="btn-main" onclick="doLogin()">Login Account</button>
                <button class="btn-ghost" onclick="toggleScreen('signup-screen')">Create New Account</button>
            </div>
        </div>
    </div>

    <div id="signup-screen" class="screen">
        <div class="auth-header" style="padding:40px;"><h2>Register</h2></div>
        <div class="auth-form">
            <input type="text" id="s-user" placeholder="Choose Username">
            <input type="email" id="s-gmail" placeholder="Gmail Address">
            <input type="text" id="s-phone" placeholder="WhatsApp Number">
            <input type="password" id="s-pass" placeholder="Create Password">
            <button class="btn-main" style="background:var(--success)" onclick="doSignup()">Create Account</button>
            <button class="btn-ghost" onclick="toggleScreen('login-screen')">Already Have Account? Login</button>
        </div>
    </div>

    <div id="user-panel" class="screen">
        <div class="dash-grid">
            <div class="box box-full">
                <small>Welcome Back,</small>
                <h2 id="displayUser" style="margin:5px 0;">Suhel Ansari</h2>
                <div style="font-size:10px; background:rgba(255,255,255,0.2); padding:4px 10px; border-radius:10px; display:inline-block;">Pro Member</div>
            </div>
            <div class="box box-bal">
                <small>Balance</small>
                <h3 id="userBalDisplay" style="margin:5px 0;">₹0.00</h3>
            </div>
            <div class="box box-spent">
                <small>Spent</small>
                <h3 id="userSpentDisplay" style="margin:5px 0;">₹0.00</h3>
            </div>
        </div>

        <div id="order-tab" class="tab-content" style="padding:15px; margin-bottom:70px;">
            <h3><i class="fas fa-shopping-cart" style="color:var(--primary)"></i> New Order</h3>
            <select id="catSelect" onchange="loadServices()">
                <option value="">Select Category</option>
                <option value="insta">📸 Instagram Services</option>
                <option value="tele">✈️ Telegram Services</option>
                <option value="yt">📺 YouTube Services</option>
            </select>
            <select id="serviceSelect" onchange="updateCost()">
                <option value="0">Choose Service</option>
            </select>
            <input type="text" id="orderLink" placeholder="Paste Link Here">
            <div id="costDisplay" style="font-weight:800; color:var(--primary); font-size:18px; margin-bottom:15px;">Cost: ₹0</div>
            <button class="btn-main" onclick="handlePlaceOrder()">Place Order Now</button>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" onclick="showTab('order-tab', this)"><i class="fas fa-home"></i>Home</div>
            <div class="nav-item" onclick="showTab('funds-tab', this)"><i class="fas fa-wallet"></i>Funds</div>
            <div class="nav-item" onclick="location.reload()"><i class="fas fa-sign-out-alt"></i>Logout</div>
        </div>
    </div>

    <div id="admin-panel" class="screen">
        <div style="background:#1e293b; color:white; padding:20px;">
            <h3>Admin Dashboard</h3>
            <div id="adminStats" style="font-size:11px; display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <span>Users: <b id="a-tu">0</b></span>
                <span>Total Bal: <b id="a-tb">0</b></span>
                <span>Total Spent: <b id="a-ts">0</b></span>
            </div>
            <button class="btn-ghost" style="color:white; border-color:white; margin-top:10px;" onclick="location.reload()">Logout Admin</button>
        </div>

        <div style="padding:15px;">
            <input type="text" id="admSearch" placeholder="🔍 Search user by name/gmail..." onkeyup="adminSearch()">
            
            <div class="admin-table-container">
                <table class="adm-table">
                    <thead><tr><th>User</th><th>Details</th><th>Bal</th><th>Action</th></tr></thead>
                    <tbody id="userTableBody"></tbody>
                </table>
            </div>

            <hr>
            <h4>Add Balance</h4>
            <input type="text" id="admUser" placeholder="Username">
            <input type="number" id="admAmt" placeholder="Amount">
            <button class="btn-main" onclick="adminAddBal()">Add Balance</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz20XdCsPYuxVCKlk7BKNr_vQWya2068bopjYW1LPH8g2GI6YEEtT4_DhVGnS1F3e5rCQ/exec";
        
        let db = JSON.parse(localStorage.getItem('smm_db')) || {};
        let sessionUser = null;

        const services = {
            insta: [ {n: "Insta Views", p: 5}, {n: "Insta Followers", p: 80} ],
            tele: [ {n: "Tele Members", p: 35} ],
            yt: [ {n: "YouTube Subs", p: 150} ]
        };

        function toggleScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function loadServices() {
            let cat = document.getElementById('catSelect').value;
            let sel = document.getElementById('serviceSelect');
            sel.innerHTML = "";
            if(services[cat]) services[cat].forEach(s => sel.innerHTML += `<option value="${s.p}">${s.n} - ₹${s.p}</option>`);
            updateCost();
        }

        function updateCost() { document.getElementById('costDisplay').innerText = "Cost: ₹" + document.getElementById('serviceSelect').value; }

        // --- AUTH ---
        function doSignup() {
            let u = document.getElementById('s-user').value.trim();
            let g = document.getElementById('s-gmail').value;
            let ph = document.getElementById('s-phone').value;
            let p = document.getElementById('s-pass').value;
            if(!u || db[u]) return alert("Username error!");
            db[u] = { gmail: g, phone: ph, pass: p, bal: 0, spent: 0 };
            localStorage.setItem('smm_db', JSON.stringify(db)); alert("Registered!"); toggleScreen('login-screen');
        }

        function doLogin() {
            let u = document.getElementById('l-user').value.trim(), p = document.getElementById('l-pass').value;
            if(u === "admin" && p === "suhel7388") { toggleScreen('admin-panel'); loadAdmin(); return; }
            if(db[u] && db[u].pass === p) { sessionUser = u; updateUI(); toggleScreen('user-panel'); } else alert("Invalid Login!");
        }

        // --- ORDER LOGIC (FIXED) ---
        async function handlePlaceOrder() {
            let cost = Number(document.getElementById('serviceSelect').value);
            let link = document.getElementById('orderLink').value;
            let srv = document.getElementById('serviceSelect').options[document.getElementById('serviceSelect').selectedIndex].text;

            if(!link || cost <= 0) return alert("Pehle details bharein!");
            
            let currentBal = Number(db[sessionUser].bal);
            
            if(currentBal < cost) {
                return alert("Paisa kam hai! Recharge karein. Current: ₹" + currentBal);
            }

            // Paisa Kato
            db[sessionUser].bal = currentBal - cost;
            db[sessionUser].spent = Number(db[sessionUser].spent || 0) + cost;
            
            let orderData = { user: sessionUser, service: srv, link: link, date: new Date().toLocaleString(), bal_left: db[sessionUser].bal };
            localStorage.setItem('smm_db', JSON.stringify(db)); 
            updateUI();

            // Sheets me bhejo
            fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(orderData) });
            
            window.open(`https://wa.me/917388720012?text=New Order: ${srv}%0AUser: ${sessionUser}%0ALink: ${link}`);
            alert("Order Lag Gaya!");
        }

        // --- ADMIN ---
        function loadAdmin() {
            let body = document.getElementById('userTableBody'); body.innerHTML = "";
            let tu = 0, tb = 0, ts = 0;
            Object.keys(db).forEach(u => {
                tu++; tb += Number(db[u].bal); ts += Number(db[u].spent || 0);
                body.innerHTML += `<tr>
                    <td><b>${u}</b></td>
                    <td>${db[u].gmail}<br>${db[u].phone}</td>
                    <td style="color:green">₹${db[u].bal}</td>
                    <td><button onclick="deleteUser('${u}')" style="color:red; border:none; background:none;">Del</button></td>
                </tr>`;
            });
            document.getElementById('a-tu').innerText = tu;
            document.getElementById('a-tb').innerText = "₹" + tb.toFixed(2);
            document.getElementById('a-ts').innerText = "₹" + ts.toFixed(2);
        }

        function adminSearch() {
            let filter = document.getElementById('admSearch').value.toLowerCase();
            let rows = document.getElementById('userTableBody').getElementsByTagName('tr');
            for(let row of rows) {
                row.style.display = row.innerText.toLowerCase().includes(filter) ? "" : "none";
            }
        }

        function adminAddBal() {
            let u = document.getElementById('admUser').value.trim(), a = Number(document.getElementById('admAmt').value);
            if(db[u]) { db[u].bal = Number(db[u].bal) + a; localStorage.setItem('smm_db', JSON.stringify(db)); loadAdmin(); alert("Added!"); }
        }

        function deleteUser(u) { if(confirm("Delete User?")) { delete db[u]; localStorage.setItem('smm_db', JSON.stringify(db)); loadAdmin(); } }

        function updateUI() { 
            document.getElementById('userBalDisplay').innerText = "₹" + Number(db[sessionUser].bal).toFixed(2);
            document.getElementById('userSpentDisplay').innerText = "₹" + Number(db[sessionUser].spent || 0).toFixed(2);
            document.getElementById('displayUser').innerText = sessionUser;
        }
    </script>
</body>
</html>
