<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSMBYAS V15 | Admin Broadcast</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #2ea44f; --bg: #f6f8fa; --card: #ffffff; --text: #24292e; --border: #d0d7de; --link: #0969da; --danger: #cf222e; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 80px; overflow-x: hidden; }

        /* ANNOUNCEMENT BAR */
        .news-bar { background: #fff8c5; border-bottom: 1px solid #d4a017; color: #735c0f; padding: 8px; font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; position: relative; }
        .news-text { display: inline-block; padding-left: 100%; animation: marquee 15s linear infinite; }
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }

        .header { background: #24292e; color: #fff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo-area { display: flex; align-items: center; gap: 8px; font-size: 20px; font-weight: 800; }
        
        .screen { display: none; padding: 15px; max-width: 600px; margin: 0 auto; animation: fadeIn 0.3s; }
        .active { display: block; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .inp { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 10px; font-size: 14px; outline: none; }
        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--primary); color: white; font-weight: 700; cursor: pointer; }
        .btn-adm { background: #24292e; margin-top: 5px; font-size: 12px; }

        .nav { position: fixed; bottom: 0; width: 100%; max-width: 600px; left: 50%; transform: translateX(-50%); background: #fff; display: flex; border-top: 1px solid var(--border); padding: 10px 0; z-index: 1000; }
        .nav-item { flex: 1; text-align: center; color: #57606a; font-size: 11px; cursor: pointer; }
        .nav-item.active { color: var(--link); font-weight: 800; }
        .nav-item i { font-size: 22px; margin-bottom: 4px; display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="news-bar" id="news-container" style="display:none;">
        <div class="news-text" id="news-content">Welcome to SSMBYAS! All services are active.</div>
    </div>

    <div id="auth-screen" style="padding: 20px; max-width: 450px; margin: auto; text-align: center;">
        <div class="logo-area" style="justify-content:center; color:#24292e; margin: 40px 0;"><i class="fa-solid fa-rocket"></i> SSMBYAS</div>
        <div class="card" id="login-box">
            <h2 style="margin-bottom:20px;">Login</h2>
            <input type="text" id="l-user" class="inp" placeholder="Username">
            <input type="password" id="l-pass" class="inp" placeholder="Password">
            <button class="btn" onclick="login()">Login</button>
            <p onclick="toggleAuth(true)" style="margin-top:15px; font-size:13px; color:var(--link); cursor:pointer;">New User? Register</p>
        </div>
        <div class="card" id="reg-box" style="display:none;">
            <h2 style="margin-bottom:20px;">Register</h2>
            <input type="text" id="r-user" class="inp" placeholder="Username">
            <input type="email" id="r-email" class="inp" placeholder="Gmail">
            <input type="password" id="r-pass" class="inp" placeholder="Password">
            <button class="btn" onclick="register()">Create Account</button>
            <p onclick="toggleAuth(false)" style="margin-top:15px; font-size:13px; color:var(--link); cursor:pointer;">Back to Login</p>
        </div>
    </div>

    <div id="main-app" style="display:none;">
        <div class="header">
            <div class="logo-area"><i class="fa-solid fa-rocket"></i> SSMBYAS</div>
            <div id="u-top" style="font-size:12px; font-weight:700;">USER <i class="fa-solid fa-user"></i></div>
        </div>

        <div id="dash-screen" class="screen active">
            <div class="card" style="display:flex; justify-content:space-around; text-align:center;">
                <div><small>Balance</small><br><b id="u-bal" style="color:var(--link); font-size:18px;">₹0</b></div>
                <div><small>Spent</small><br><b id="u-spent" style="font-size:18px;">₹0</b></div>
            </div>
            <div class="card">
                <h4>Place Order</h4>
                <select id="srv-select" class="inp">
                    <option value="1798|0.10">Instagram Views - ₹0.10/k</option>
                    <option value="3274|45.00">Instagram Followers - ₹45/k</option>
                </select>
                <input type="text" id="o-link" class="inp" placeholder="Link">
                <input type="number" id="o-qty" class="inp" placeholder="Quantity">
                <button class="btn" onclick="placeOrder()">Order Now</button>
            </div>
        </div>

        <div id="admin-screen" class="screen">
            <div class="card" style="border-top:5px solid var(--danger);">
                <h3><i class="fa-solid fa-bullhorn"></i> Broadcast & Tools</h3>
                
                <label style="font-size:12px; margin-top:10px; display:block;">Set Announcement Message:</label>
                <input type="text" id="adm-news-inp" class="inp" placeholder="Type news here...">
                <button class="btn btn-adm" onclick="updateNews()">Update News Bar</button>

                <h4 style="margin-top:20px;">Data Management</h4>
                <div style="display:flex; gap:10px;">
                    <button class="btn btn-adm" style="flex:1;" onclick="downloadBackup()"><i class="fa-solid fa-download"></i> Backup</button>
                    <label class="btn btn-adm" style="flex:1; text-align:center; cursor:pointer;">
                        <i class="fa-solid fa-upload"></i> Restore
                        <input type="file" id="restore-file" style="display:none;" onchange="restoreBackup(event)">
                    </label>
                </div>
            </div>

            <div class="card">
                <h4>User Management</h4>
                <div id="adm-user-list"></div>
            </div>
        </div>

        <div class="nav">
            <div class="nav-item active" onclick="showScreen('dash-screen', this)"><i class="fa-solid fa-home"></i>Home</div>
            <div class="nav-item" id="adm-nav" style="display:none;" onclick="showScreen('admin-screen', this)"><i class="fa-solid fa-shield-halved"></i>Admin</div>
            <div class="nav-item" onclick="logout()"><i class="fa-solid fa-sign-out"></i>Exit</div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('ssmbyas_v15')) || {
            users: { 'suhel': {pass:'7388', email:'admin@ssmbyas.com', bal:5000, spent:0, orders:[]} },
            news: "Welcome to SSMBYAS V15! Best SMM Services here.",
            session: null
        };

        let currentUser = null;
        window.onload = () => { 
            if(db.session) { currentUser = db.session; launch(); }
            applyNews(); 
        };

        function toggleAuth(r) {
            document.getElementById('login-box').style.display = r ? 'none' : 'block';
            document.getElementById('reg-box').style.display = r ? 'block' : 'none';
        }

        function login() {
            let u = document.getElementById('l-user').value.toLowerCase().trim();
            let p = document.getElementById('l-pass').value;
            if(db.users[u] && db.users[u].pass === p) { db.session = u; currentUser = u; save(); launch(); }
            else alert("Ghalat Password!");
        }

        function register() {
            let u = document.getElementById('r-user').value.toLowerCase().trim();
            let e = document.getElementById('r-email').value;
            let p = document.getElementById('r-pass').value;
            if(!u || !p) return alert("Details bharein!");
            if(db.users[u]) return alert("Username taken!");
            db.users[u] = { pass:p, email:e, bal:0, spent:0, orders:[] };
            save(); alert("Registered!"); toggleAuth(false);
        }

        function launch() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('news-container').style.display = 'block';
            document.getElementById('u-top').innerText = currentUser.toUpperCase();
            if(currentUser === 'suhel') document.getElementById('adm-nav').style.display = 'block';
            updateUI();
        }

        function updateNews() {
            let msg = document.getElementById('adm-news-inp').value;
            if(!msg) return alert("Message likhein!");
            db.news = msg;
            save();
            applyNews();
            alert("Announcement Updated!");
        }

        function applyNews() {
            document.getElementById('news-content').innerText = db.news;
        }

        function downloadBackup() {
            let dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
            let dlAnchorElem = document.createElement('a');
            dlAnchorElem.setAttribute("href", dataStr);
            dlAnchorElem.setAttribute("download", `ssmbyas_backup.json`);
            dlAnchorElem.click();
        }

        function restoreBackup(event) {
            let file = event.target.files[0];
            if(!file) return;
            let reader = new FileReader();
            reader.onload = function(e) {
                db = JSON.parse(e.target.result);
                save();
                alert("Data Restored!");
                location.reload();
            };
            reader.readAsText(file);
        }

        function logout() { db.session = null; save(); location.reload(); }

        function updateUI() {
            let usr = db.users[currentUser];
            document.getElementById('u-bal').innerText = "₹" + usr.bal.toFixed(2);
            document.getElementById('u-spent').innerText = "₹" + usr.spent.toFixed(2);
        }

        function loadAdmin() {
            let uHtml = "";
            for(let u in db.users) {
                let usr = db.users[u];
                uHtml += `<div class="card" onclick="toggleDet('${u}')" style="cursor:pointer; font-size:12px;">
                    <b>${u}</b> | Bal: ₹${usr.bal}
                    <div id="det-${u}" style="display:none; margin-top:10px; border-top:1px solid #eee; padding-top:5px;">
                        Email: ${usr.email} | Pass: ${usr.pass}
                        <button class="btn btn-adm" onclick="addBal('${u}')">Add ₹100</button>
                    </div>
                </div>`;
            }
            document.getElementById('adm-user-list').innerHTML = uHtml;
        }

        function toggleDet(id) { let el = document.getElementById('det-'+id); el.style.display = el.style.display==='none'?'block':'none'; }
        function addBal(u) { db.users[u].bal += 100; save(); loadAdmin(); }

        function showScreen(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(el) el.classList.add('active');
            if(id === 'admin-screen') loadAdmin();
        }

        function save() { localStorage.setItem('ssmbyas_v15', JSON.stringify(db)); }
    </script>
</body>
</html>
