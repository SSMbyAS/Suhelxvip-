<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMMbyAS - Pro Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #007bff; /* Professional Blue */
            --primary-light: #e0f0ff;
            --text-dark: #1a1a1a;
            --text-light: #6c757d;
            --card-bg: #ffffff;
            --bg-body: #f7f9fc;
            --purple-bg: #7a5df5; /* Background behind girl */
            --orange-tag: #ff9f43; /* Rocket trail / chat support tag */
            --shadow: 0 10px 40px rgba(0,0,0,0.06);
            --shadow-float: 0 15px 50px rgba(0,0,0,0.1);
            --border-radius: 16px;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg-body); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; color: var(--text-dark); }

        /* Screens */
        .screen { display: none; width: 100%; max-width: 480px; padding: 20px; box-sizing: border-box; }
        .active { display: block; }

        /* --- NEW PROFESSIONAL LOGIN STYLE --- */
        #login-screen { padding: 0; background: var(--card-bg); position: relative; height: 100vh; display: flex; flex-direction: column; justify-content: flex-start; }

        /* Header (Logo & Menu) */
        .login-header { display: flex; justify-content: space-between; align-items: center; padding: 25px 30px; }
        .login-logo { font-size: 28px; font-weight: 800; color: var(--primary); text-decoration: underline; text-underline-offset: 6px; }
        .menu-icon { font-size: 24px; color: var(--text-light); cursor: pointer; }

        /* Auth Form Card */
        .login-form-container { padding: 0 30px; flex-grow: 1; display: flex; flex-direction: column; justify-content: flex-start; margin-top: 10px; }
        .form-card { background: var(--card-bg); }

        /* Input Container with Icons */
        .input-group { position: relative; margin-bottom: 18px; }
        .input-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #b5b8c1; font-size: 19px; }
        .input-group input { 
            width: 100%; 
            padding: 20px 20px 20px 55px; 
            border-radius: 12px; 
            border: 1.5px solid #eaeaea; 
            box-sizing: border-box; 
            outline: none; 
            font-size: 16px; 
            font-family: 'Inter', sans-serif;
            transition: 0.2s;
        }
        .input-group input:focus { border-color: var(--primary); box-shadow: 0 0 12px rgba(0, 123, 255, 0.1); }
        .password-toggle { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); color: #b5b8c1; cursor: pointer; font-size: 18px; }

        /* Options (Remember & Forgot) */
        .options-bar { display: flex; justify-content: space-between; align-items: center; font-size: 14px; color: var(--text-light); margin-bottom: 25px; font-weight: 500; }
        .options-bar a { color: var(--primary); text-decoration: none; font-weight: 600; }

        /* Sign In Button */
        .btn-signin { 
            width: 100%; 
            padding: 20px; 
            border-radius: 12px; 
            border: none; 
            font-weight: 700; 
            cursor: pointer; 
            font-size: 18px; 
            color: white; 
            background: var(--primary); 
            box-shadow: 0 6px 20px rgba(0, 123, 255, 0.2); 
            text-transform: capitalize; 
            letter-spacing: 0.5px;
            margin-bottom: 20px;
        }

        /* Don't have an account? */
        .signup-text { font-size: 15px; color: var(--text-light); text-align: center; font-weight: 500; }
        .signup-text span { color: var(--primary); font-weight: 700; cursor: pointer; }

        /* --- Graphics Section (Girl, Rocket, Icons) --- */
        .login-graphics-wrapper { 
            position: relative; 
            width: 100%; 
            height: 380px; /* Fixed height for graphics area */
            margin-top: auto; 
            margin-bottom: 0px;
            overflow: hidden; 
        }

        /* Purple background shape */
        .purple-shape { 
            position: absolute; 
            bottom: -50px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 130%; /* Very wide to curve */
            height: 350px; 
            background: var(--purple-bg); 
            border-radius: 50% 50% 0 0; 
            z-index: 1; 
        }

        /* The happy girl image */
        .girl-image { 
            position: absolute; 
            bottom: 0; 
            left: 50%; 
            transform: translateX(-50%); 
            width: auto; 
            height: 380px; 
            z-index: 2; 
        }

        /* 24/7 Live Support Box */
        .support-box { 
            position: absolute; 
            top: 60px; 
            left: 30px; 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(5px);
            padding: 10px 15px; 
            border-radius: 10px; 
            display: flex; 
            align-items: center; 
            z-index: 3; 
            box-shadow: var(--shadow-float);
        }
        .bolt-icon { color: #f9ca24; font-size: 18px; margin-right: 8px; }
        .support-box span { font-size: 13px; font-weight: 700; color: #333; }

        /* Floating Objects (Rocket & Cubes) */
        .rocket-icon { 
            position: absolute; 
            top: 10px; 
            right: 40px; 
            height: 100px; 
            z-index: 3; 
            animation: float 4s ease-in-out infinite; 
        }
        .floating-cubes { 
            position: absolute; 
            top: 150px; 
            left: 50px; 
            height: 80px; 
            z-index: 3; 
            animation: floatOpposite 5s ease-in-out infinite; 
        }

        /* Social Icons Floating Bottom */
        .social-icons-bar { 
            position: absolute; 
            bottom: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(10px);
            padding: 15px 30px; 
            border-radius: 12px; 
            display: flex; 
            gap: 15px; 
            z-index: 4; 
            box-shadow: var(--shadow-float);
            max-width: 80%;
        }
        .social-icons-bar img { height: 35px; width: 35px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .social-icons-bar img:hover { transform: translateY(-5px); }

        /* Tiny floating emojis */
        .tiny-emojis {
            position: absolute;
            bottom: 80px;
            right: 30px;
            background: rgba(255, 255, 255, 0.9);
            padding: 8px;
            border-radius: 8px;
            font-size: 18px;
            z-index: 3;
            box-shadow: var(--shadow);
        }

        /* Floating Animations */
        @keyframes float { 
            0%, 100% { transform: translateY(0) rotate(5deg); } 
            50% { transform: translateY(-10px) rotate(-5deg); } 
        }
        @keyframes floatOpposite { 
            0%, 100% { transform: translateY(0) rotate(-5deg); } 
            50% { transform: translateY(10px) rotate(5deg); } 
        }

        /* Other Screens styles (placeholder) */
        .card-old { background: #fff; padding: 25px; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }

    </style>
</head>
<body>

    <div id="login-screen" class="screen active">
        
        <div class="login-header">
            <div class="login-logo">SMMbyAS</div>
            <div class="menu-icon"><i class="fas fa-bars"></i></div>
        </div>

        <div class="login-form-container">
            <div class="form-card">
                
                <div class="input-group">
                    <i class="fas fa-user-circle input-icon"></i>
                    <input type="text" id="l-user" placeholder="Username">
                }

                <div class="input-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="l-pass" placeholder="Password">
                    <i class="fas fa-eye password-toggle"></i>
                </div>

                <div class="options-bar">
                    <label style="display:flex; align-items:center; cursor:pointer;">
                        <input type="checkbox" style="width:16px; height:16px; margin:0 8px 0 0; cursor:pointer;">
                        Remember me
                    </label>
                    <a href="#" onclick="alert('Bataiye admin ko WhatsApp pe!')">Forgot password?</a>
                </div>

                <button class="btn-signin" onclick="doLogin()">Sign in</button>

                <p class="signup-text">Do not have an account? <span onclick="toggleScreen('signup-screen')">Sign up</span></p>

            </div>
        </div>

        <div class="login-graphics-wrapper">
            <div class="purple-shape"></div>
            <img src="https://growfansite.com/assets/img/login_img.png" alt="Happy Girl" class="girl-image">
            
            <div class="support-box">
                <i class="fas fa-bolt bolt-icon"></i>
                <span>24/7 Live Chat Support</span>
            </div>
            
            <img src="https://growfansite.com/assets/img/login_obj.png" alt="Rocket Object" class="rocket-icon">
            
            <img src="https://growfansite.com/assets/img/login_obj2.png" alt="Cube Object" class="floating-cubes">

            <div class="tiny-emojis">🥰❤️</div>

            <div class="social-icons-bar">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" alt="Facebook">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" alt="Instagram">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/ce/X_logo_2023.svg" alt="Twitter/X">
                <img src="https://upload.wikimedia.org/wikipedia/commons/3/34/TikTok_logo_with_wordmark.svg" alt="TikTok">
                <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" alt="Telegram">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.svg" alt="YouTube">
            </div>
        </div>
    </div>

    <div id="signup-screen" class="screen">
        <div class="card-old" style="margin-top:50px;">
            <h2>Register</h2>
            <input type="text" id="s-user" placeholder="Username">
            <input type="email" id="s-email" placeholder="Gmail">
            <input type="text" id="s-phone" placeholder="WhatsApp Number">
            <input type="password" id="s-pass" placeholder="Create Password">
            <button class="btn btn-blue" style="width:100%; padding:15px; margin-top:10px;" onclick="doSignup()">Create Account Now</button>
            <p onclick="toggleScreen('login-screen')" style="color:#007bff; cursor:pointer; font-size:13px; text-align:center; margin-top:15px; font-weight:700;">Back to Login</p>
        </div>
    </div>
    
    </body>
</html>
