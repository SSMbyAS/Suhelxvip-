<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUHEL X MODS - VIP SERVER</title>
    <style>
        :root { --neon: #00ff41; --danger: #ff003c; --gold: #ffea00; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; }
        
        .top-bar { display: flex; justify-content: space-between; padding: 10px 15px; background: #000; font-size: 11px; border-bottom: 1px solid #111; }
        .zigzag-name { font-size: 32px; font-weight: 900; letter-spacing: 3px; margin: 20px 0; color: #fff; text-shadow: 0 0 15px var(--neon); }
        
        .glass-box { max-width: 400px; margin: 10px auto; background: rgba(255,255,255,0.02); border: 1px solid #222; border-radius: 20px; padding: 20px; }
        
        .pred-display { font-size: 50px; font-weight: 900; margin: 15px 0; color: var(--neon); text-shadow: 0 0 20px var(--neon); }
        .locked-text { color: #111; text-shadow: none; -webkit-text-stroke: 1px var(--neon); }
        
        .btn-active { width: 90%; padding: 15px; background: var(--neon); border: none; border-radius: 12px; color: #000; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        
        table { width: 100%; margin-top: 15px; border-collapse: collapse; font-size: 13px; color: #ccc; }
        th { color: #555; padding: 10px; border-bottom: 1px solid #222; }
        td { padding: 12px; border-bottom: 1px solid #111; }
        .win { color: var(--neon); font-weight: bold; }
        .loss { color: var(--danger); font-weight: bold; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .modal-content { background: #111; padding: 25px; border-radius: 20px; border: 1px solid var(--neon); width: 85%; max-width: 350px; }
        
        /* QR Container Fix */
        .qr-frame { background: #fff; padding: 15px; border-radius: 15px; margin: 15px auto; width: 200px; height: 200px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .qr-frame img { width: 100%; height: auto; display: block; }
    </style>
</head>
<body>

<div class="top-bar">
    <div id="live-clock">--:--:--</div>
    <div id="expire-timer" style="color: var(--gold);">EXPIRES IN: 72:00:00</div>
</div>

<div class="zigzag-name">SUHEL X MODS</div>

<div class="glass-box">
    <div id="period-id" style="color:#888; font-size: 13px;">LIVE PERIOD NUMBER: FETCHING...</div>
    <div id="prediction-box" class="pred-display locked-text">LOCKED</div>
    <div id="game-timer" style="color:var(--gold); font-family: monospace; font-size: 18px;">00:00</div>
    <button id="action-btn" class="btn-active" onclick="showPay()">PREMIUM ACTIVE ✅</button>
</div>

<div class="glass-box">
    <h4 style="text-align: left; margin: 0; color: #555; font-size: 12px;">SIGNAL HISTORY</h4>
    <table>
        <thead><tr><th>PRD</th><th>SIGNAL</th><th>RESULT</th></tr></thead>
        <tbody id="logs"></tbody>
    </table>
</div>

<div id="payModal" class="modal">
    <div class="modal-content">
        <h3 style="color:var(--neon); margin: 0;">Activate VIP Server</h3>
        <p style="font-size: 12px; color: #888;">Scan & Pay ₹500 (3 Days Access)</p>
        
             <div class="qr-placeholder">
             <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=7388720012@fam%26pn=Md%20Suhel%26am=500%26cu=INR" alt="UPI QR">
        </div>
        
        <p style="color:var(--neon); font-weight:bold; margin: 5px 0; font-size: 14px;">7388720012@fam</p>
        
        <input type="text" id="utr" placeholder="Enter 12 Digit UTR" style="width:90%; padding:12px; margin-bottom:15px; background:#000; border:1px solid #333; color:var(--neon); text-align:center; border-radius: 8px;">
        <button class="btn-active" onclick="submitUTR()">SUBMIT UTR</button>
        <button onclick="closePay()" style="background:none; border:none; color:#444; margin-top:10px; cursor:pointer;">Cancel</button>
    </div>
</div>

<script>
    const DEVICE_ID = btoa(navigator.userAgent).slice(0, 8);
    let isVip = false;
    let nextSignal = "";

    setInterval(() => {
        document.getElementById('live-clock').innerText = new Date().toLocaleTimeString().toLowerCase();
        checkVipStatus();
    }, 1000);

    function showPay() { if(!isVip) document.getElementById('payModal').style.display = 'flex'; }
    function closePay() { document.getElementById('payModal').style.display = 'none'; }

    function submitUTR() {
        const u = document.getElementById('utr').value;
        if(u.length < 10) return alert("Please enter a valid 12-digit UTR!");
        let r = JSON.parse(localStorage.getItem('suhel_reqs') || '[]');
        r.push({ utr: u, dev: DEVICE_ID, status: 'pending', time: new Date().toLocaleString() });
        localStorage.setItem('suhel_reqs', JSON.stringify(r));
        alert("Success! Admin approval pending.");
        closePay();
    }

    function checkVipStatus() {
        const apps = JSON.parse(localStorage.getItem('suhel_approvals') || '{}');
        if (apps[DEVICE_ID]) {
            const now = new Date().getTime();
            const diff = apps[DEVICE_ID].expiry - now;
            if (diff > 0) {
                isVip = true;
                document.getElementById('prediction-box').classList.remove('locked-text');
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                document.getElementById('expire-timer').innerText = `EXPIRES IN: ${h}:${m}:${s}`;
            } else {
                isVip = false;
                document.getElementById('prediction-box').classList.add('locked-text');
                document.getElementById('prediction-box').innerText = "LOCKED";
            }
        }
    }

    async function startServer() {
        setInterval(async () => {
            try {
                const res = await fetch('https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json');
                const data = await res.json();
                const last = data.data.list[0];
                
                document.getElementById('period-id').innerText = "LIVE PERIOD NUMBER: " + (BigInt(last.issueNumber) + 1n);
                const sec = 60 - new Date().getSeconds();
                document.getElementById('game-timer').innerText = `00:${sec < 10 ? '0'+sec : sec}`;

                if (sec === 59 || !nextSignal) {
                    nextSignal = Math.random() > 0.5 ? "BIG" : "SMALL";
                }

                if(isVip) {
                    document.getElementById('prediction-box').innerText = nextSignal;
                } else {
                    document.getElementById('prediction-box').innerText = "LOCKED";
                }

                if (window.lastID !== last.issueNumber) {
                    const actualRes = parseInt(last.number) >= 5 ? "BIG" : "SMALL";
                    const displaySignal = window.prevSignal || (Math.random() > 0.5 ? "BIG" : "SMALL");
                    const winStatus = (displaySignal === actualRes) ? "WIN" : "LOSS";
                    
                    const row = `<tr>
                        <td>${last.issueNumber.slice(-4)}</td>
                        <td>${displaySignal}</td>
                        <td class="${winStatus === 'WIN' ? 'win' : 'loss'}">${winStatus}</td>
                    </tr>`;
                    
                    document.getElementById('logs').insertAdjacentHTML('afterbegin', row);
                    window.lastID = last.issueNumber;
                    window.prevSignal = nextSignal;
                }
            } catch(e) { console.log("Sync Error"); }
        }, 2000);
    }
    startServer();
</script>
</body>
</html>
