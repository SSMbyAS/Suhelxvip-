<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSMBYAS | Professional SMM</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --primary: #2ea44f; 
            --primary-dark: #2c974b;
            --bg: #ffffff; 
            --card: #f6f8fa; 
            --text: #24292e; 
            --border: #e1e4e8;
            --success: #2ea44f; 
            --danger: #d73a49; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 90px; overflow-x: hidden; }

        /* --- AUTH SCREEN --- */
        .auth-container { 
            min-height: 100vh; 
            background: #f6f8fa; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        /* CUSTOM LOGO STYLE */
        .auth-logo-top { 
            font-size: 32px; font-weight: 800; color: #24292e; margin-bottom: 20px; 
            background: white; padding: 10px 20px; border-radius: 12px; border: 1px solid var(--border);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .auth-card { 
            background: #ffffff; padding: 30px 25px; border-radius: 8px; 
            width: 100%; max-width: 340px; border: 1px solid var(--border);
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
        }
        .auth-card h2 { font-size: 18px; font-weight: 400; color: #24292e; margin-bottom: 15px; text-align: center; }
        
        /* --- UI COMPONENTS --- */
        .header { background: #fff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 700; color: #24292e; font-size: 18px; }
        .screen { display: none; padding: 15px; max-width: 500px; margin: 0 auto; }
        .active { display: block; animation: fadeIn 0.3s ease-in; }

        .card { background: var(--card); padding: 20px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 15px; }
        .inp, select { width: 100%; padding: 10px 12px; border-radius: 6px; border: 1px solid #d1d5da; margin-bottom: 12px; outline: none; font-size: 14px; background: #fff; }
        .inp:focus { border-color: #0366d6; box-shadow: 0 0 0 3px rgba(3,102,214,0.2); }
        
        .btn { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid rgba(27,31,35,0.15); background: var(--primary); color: white; font-weight: 600; font-size: 14px; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: var(--primary-dark); }

        /* NOTIFICATION POPUPS */
        .popup-msg { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); color: white; padding: 14px 24px; border-radius: 8px; font-weight: 600; font-size: 14px; z-index: 10000; box-shadow: 0 10px 25px rgba(0,0,0,0.2); display: flex; align-items: center; gap: 10px; animation: slideIn 0.4s ease-out; }
        .popup-success { background: var(--success); }
        .popup-error { background: var(--danger); }

        /* Bottom Nav */
        .nav { position: fixed; bottom: 0; width: 100%; max-width: 500px; left: 50%; transform: translateX(-50%); background: #fff; display: flex; padding: 10px; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { flex: 1; text-align: center; color: #586069; font-size: 10px; cursor: pointer; }
        .nav-item.active { color: #0366d6; font-weight: 600; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 2px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideIn { from { top: -100px; } to { top: 20px; } }

        .stat-grid { display: flex; gap: 10px; margin-bottom: 15px; }
        .stat-box { flex: 1; padding: 15px; border-radius: 8px; border: 1px solid var(--border); background: #fff; }
        .stat-box small { color: #586069; font-size: 11px; }
        .stat-box h2 { font-size: 18px; margin-top: 2px; }
        .hist-item { background: #fff; padding: 10px; border-radius: 6px; margin-bottom: 8px; border: 1px solid var(--border); font-size: 12px; }
        .status { padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: 700; color: white; float: right; }
        .status-Pending { background: #f59e0b; }
        .status-Completed { background: #2ea44f; }
    </style>
</head>
<body>

    <div id="auth-screen" class="auth-container">
        <div class="auth-logo-top">SSMBYAS</div>
        
        <div class="auth-card" id="login-box">
            <h2>Login to your account</h2>
            <input type="text" id="l-user" class="inp" placeholder="Username">
            <input type="password" id="l-pass" class="inp" placeholder="Password">
            <button class="btn" onclick="login()">Sign in</button>
            <p onclick="toggleAuth(true)" style="margin-top:20px; cursor:pointer; font-size:12px; text-align:center; color:#0366d6;">Create an account</p>
        </div>

        <div class="auth-card" id="reg-box" style="display:none;">
            <h2>Join SSMBYAS</h2>
            <input type="text" id="r-user" class="inp" placeholder="Username">
            <input type="number" id="r-mobile" class="inp" placeholder="Mobile">
            <input type="password" id="r-pass" class="inp" placeholder="Password">
            <input type="password" id="r-pass2" class="inp" placeholder="Confirm Password">
            <button class="btn" onclick="register()">Create account</button>
            <p onclick="toggleAuth(false)" style="margin-top:20px; cursor:pointer; font-size:12px; text-align:center; color:#0366d6;">Already have an account? Sign in</p>
        </div>
    </div>

    <div id="main-app" style="display:none;">
        <div class="header">
            <div class="logo">SSMBYAS</div>
            <div id="u-top" style="font-size:12px; color:#0366d6; font-weight:600;">User</div>
        </div>

        <div id="dash-screen" class="screen">
            <div class="stat-grid">
                <div class="stat-box"><small>Balance</small><h2 id="u-bal">₹0.00</h2></div>
                <div class="stat-box"><small>Total Spent</small><h2 id="u-spent">₹0.00</h2></div>
            </div>
            <div class="card">
                <h3>New Order</h3>
                <select id="cat-select" onchange="loadServices()"></select>
                <select id="srv-select" onchange="calcPrice()"></select>
                <input type="text" id="o-link" class="inp" placeholder="Link (Instagram/YouTube)">
                <input type="number" id="o-qty" class="inp" placeholder="Quantity" oninput="calcPrice()">
                <div style="background:#fff; padding:10px; border-radius:6px; text-align:center; margin-bottom:12px; border:1px solid var(--border);">
                    <h3 id="o-charge">₹0.00</h3>
                </div>
                <button class="btn" id="order-btn" onclick="placeOrder()">Place Order</button>
            </div>
        </div>

        <div id="fund-screen" class="screen">
            <div class="card" style="text-align:center;">
                <h3>Add Funds</h3>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=upi://pay?pa=suhel@upi&pn=SSMBYAS" style="width:140px; margin:15px 0;">
                <input type="number" id="f-amt" class="inp" placeholder="Amount (₹)">
                <input type="text" id="f-utr" class="inp" placeholder="UTR Number">
                <button class="btn" onclick="submitFund()">Submit Deposit</button>
            </div>
            <div id="fund-hist-list"></div>
        </div>

        <div id="hist-screen" class="screen">
            <div class="card" style="background:#f1f8ff; border-color:#c8e1ff;">
                <p id="ref-link" style="font-size:11px; color:#0366d6;"></p>
            </div>
            <h4>Order History</h4>
            <div id="order-hist-list"></div>
        </div>

        <div id="admin-screen" class="screen">
            <div class="card">
                <h3 style="color:var(--danger)">Admin Control</h3>
                <label>Margin (₹)</label>
                <input type="number" id="adm-margin" class="inp" onchange="saveMargin()">
                <div id="adm-req-list"></div>
                <div id="adm-user-list" style="margin-top:10px;"></div>
                <div id="adm-order-list" style="margin-top:10px;"></div>
            </div>
        </div>

        <div class="nav">
            <div class="nav-item active" onclick="showScreen('dash-screen', this)"><i class="fa-solid fa-home"></i>Home</div>
            <div class="nav-item" onclick="showScreen('fund-screen', this)"><i class="fa-solid fa-plus-circle"></i>Funds</div>
            <div class="nav-item" onclick="showScreen('hist-screen', this)"><i class="fa-solid fa-history"></i>History</div>
            <div id="nav-adm" class="nav-item" style="display:none;" onclick="showScreen('admin-screen', this)"><i class="fa-solid fa-shield"></i>Admin</div>
            <div class="nav-item" onclick="location.reload()"><i class="fa-solid fa-sign-out"></i>Exit</div>
        </div>
    </div>

    <script>
        const API_KEY = "ed122fb4bd6c98f731ef008ea3f6372d2994ca5e";
        const API_URL = "https://starofsmm.com/api/v2";
        const PROXY = "https://corsproxy.io/?";

        // Initial Database Fix
        let db = JSON.parse(localStorage.getItem('ssmbyas_db_final')) || {
            'suhel': {pass:'7388', bal:5000, spent:0, mobile:'7388720018', orders:[], funds:[]},
            'requests': [],
            'config': {margin: 1.0}
        };

        let currentUser = null;

        function showNotification(msg, type='success') {
            const old = document.querySelector('.popup-msg'); if(old) old.remove();
            let div = document.createElement('div');
            div.className = `popup-msg popup-${type}`;
            div.innerHTML = `<i class="fa-solid ${type==='success'?'fa-check-circle':'fa-times-circle'}"></i> ${msg}`;
            document.body.appendChild(div);
            setTimeout(() => { div.style.opacity='0'; setTimeout(()=>div.remove(), 500); }, 3000);
        }

        function toggleAuth(isReg) {
            document.getElementById('login-box').style.display = isReg ? 'none' : 'block';
            document.getElementById('reg-box').style.display = isReg ? 'block' : 'none';
        }

        function register() {
            let u = document.getElementById('r-user').value.toLowerCase().trim();
            let p = document.getElementById('r-pass').value;
            let p2 = document.getElementById('r-pass2').value;
            let m = document.getElementById('r-mobile').value;

            if(!u || !p || !m) return showNotification("Sab fields bharein!", "error");
            if(p !== p2) return showNotification("Password match nahi hua!", "error");
            if(db[u]) return showNotification("User pehle se hai!", "error");

            db[u] = {pass:p, mobile:m, bal:0, spent:0, orders:[], funds:[]};
            save();
            showNotification("Registration Successful! Ab Login karein.");
            toggleAuth(false);
        }

        function login() {
            let u = document.getElementById('l-user').value.toLowerCase().trim();
            let p = document.getElementById('l-pass').value;

            if(db[u] && db[u].pass === p) {
                currentUser = u;
                launchApp();
            } else {
                showNotification("Ghalat details! Dubara check karein.", "error");
            }
        }

        function launchApp() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('u-top').innerText = currentUser;
            if(currentUser === 'suhel') document.getElementById('nav-adm').style.display = 'block';
            
            // Load Categories
            const categories = {"Instagram": [{id: 9259, name: "Insta Views", rate: 0.10}], "YouTube": [{id: 221, name: "YT Subs", rate: 200}]};
            document.getElementById('cat-select').innerHTML = Object.keys(categories).map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('ref-link').innerText = "Ref link: ssmbyas.com/r?=" + currentUser;
            loadServices();
            updateUI();
        }

        function loadServices() {
            // Static example for brevity, replace with your full categories object
            const services = [{id: 9259, name: "Premium Views", rate: 0.10}, {id: 111, name: "Likes", rate: 5.0}];
            let m = db.config.margin;
            document.getElementById('srv-select').innerHTML = services.map(s => `<option value="${s.id}|${s.rate+m}">${s.name} - ₹${(s.rate+m).toFixed(2)}</option>`).join('');
            calcPrice();
        }

        function calcPrice() {
            let val = document.getElementById('srv-select').value.split('|');
            let qty = document.getElementById('o-qty').value || 0;
            let charge = (parseFloat(val[1])/1000) * qty;
            document.getElementById('o-charge').innerText = "₹" + charge.toFixed(2);
        }

        async function placeOrder() {
            let val = document.getElementById('srv-select').value.split('|');
            let qty = document.getElementById('o-qty').value;
            let link = document.getElementById('o-link').value;
            let cost = (parseFloat(val[1])/1000) * qty;

            if(!link || !qty) return showNotification("Details sahi se bharein!", "error");
            if(db[currentUser].bal < cost) return showNotification("Balance kam hai!", "error");

            db[currentUser].bal -= cost;
            db[currentUser].spent += cost;
            db[currentUser].orders.push({id: Math.floor(Math.random()*9999), srv: val[0], amt: cost, date: new Date().toLocaleDateString()});
            save();
            showNotification("Success! Order placed hogaya.");
            updateUI();
        }

        function submitFund() {
            let a = parseFloat(document.getElementById('f-amt').value);
            let u = document.getElementById('f-utr').value;
            if(!a || u.length < 10) return showNotification("UTR sahi se daalein!", "error");
            
            let req = {user: currentUser, amt: a, utr: u, status: 'Pending', date: new Date().toLocaleDateString()};
            db.requests.push(req);
            db[currentUser].funds.push(req);
            save(); 
            showNotification("Request sent! Admin approve karega.");
            updateUI();
        }

        function updateUI() {
            document.getElementById('u-bal').innerText = "₹" + db[currentUser].bal.toFixed(2);
            document.getElementById('u-spent').innerText = "₹" + db[currentUser].spent.toFixed(2);
            let oHtml = db[currentUser].orders.map(o => `<div class="hist-item">ID: ${o.id} - ₹${o.amt} <span class="status status-Completed">Done</span></div>`).reverse().join('');
            document.getElementById('order-hist-list').innerHTML = oHtml || "No orders";
        }

        function showScreen(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        function save() { localStorage.setItem('ssmbyas_db_final', JSON.stringify(db)); }
    </script>
</body>
</html>
