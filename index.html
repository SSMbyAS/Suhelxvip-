<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSMBYAS V10 | Anti-Duplicate & Ref Link</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #2ea44f; --bg: #f6f8fa; --card: #ffffff; --text: #24292e; --border: #d0d7de; --link: #0969da; --danger: #cf222e; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 80px; }

        .header { background: #24292e; color: #fff; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 20px; font-weight: 800; }

        .screen { display: none; padding: 15px; max-width: 600px; margin: 0 auto; animation: fadeIn 0.3s; }
        .active { display: block; }
        .card { background: var(--card); padding: 20px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 15px; }
        
        .inp { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid var(--border); margin-bottom: 12px; font-size: 14px; }
        .btn { width: 100%; padding: 12px; border-radius: 6px; border: none; background: var(--primary); color: white; font-weight: 600; cursor: pointer; }
        
        /* REFERRAL LINK BOX */
        .ref-link-box { background: #f1f8ff; border: 1px dashed var(--link); padding: 12px; border-radius: 6px; margin: 15px 0; word-break: break-all; font-size: 12px; position: relative; }
        .copy-btn { position: absolute; right: 5px; top: 5px; background: var(--link); color: #fff; border: none; padding: 2px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; }

        .nav { position: fixed; bottom: 0; width: 100%; max-width: 600px; left: 50%; transform: translateX(-50%); background: #fff; display: flex; border-top: 1px solid var(--border); padding: 10px 0; }
        .nav-item { flex: 1; text-align: center; color: #57606a; font-size: 11px; cursor: pointer; }
        .nav-item.active { color: var(--link); font-weight: 700; }
        .nav-item i { font-size: 20px; margin-bottom: 4px; display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="auth-screen" style="padding:50px 20px; text-align:center;">
        <h1 style="margin-bottom:30px;">SSMBYAS</h1>
        <div class="card" style="max-width:360px; margin:auto;">
            <input type="text" id="l-user" class="inp" placeholder="Username">
            <input type="password" id="l-pass" class="inp" placeholder="Password">
            <button class="btn" onclick="login()">Login</button>
        </div>
    </div>

    <div id="main-app" style="display:none;">
        <div class="header">
            <div class="logo">SSMBYAS</div>
            <div id="u-top" style="font-size:12px;">User</div>
        </div>

        <div id="dash-screen" class="screen active">
            <div class="card">
                <h3>New Order</h3>
                <select id="cat-select" class="inp" onchange="loadServices()"></select>
                <select id="srv-select" class="inp"></select>
                <input type="text" id="o-link" class="inp" placeholder="Paste Link Here">
                <input type="number" id="o-qty" class="inp" placeholder="Quantity">
                <button class="btn" onclick="placeOrder()">Place Order</button>
            </div>
            <h4>My Orders</h4>
            <div id="u-orders"></div>
        </div>

        <div id="refer-screen" class="screen">
            <div class="card" style="text-align:center;">
                <i class="fa-solid fa-link" style="font-size:30px; color:var(--link);"></i>
                <h3 style="margin-top:10px;">Refer & Earn Link</h3>
                <p style="font-size:12px; color:#666;">Is link ko share karein aur 5% commission payein.</p>
                
                <div class="ref-link-box">
                    <span id="display-ref-link">https://ssmbyas.github.io/?ref=user</span>
                    <button class="copy-btn" onclick="copyLink()">COPY</button>
                </div>
                
                <div style="display:flex; justify-content:space-between; margin-top:20px;">
                    <div class="card" style="flex:1; margin-right:5px;">Ref: <b id="u-ref-count">0</b></div>
                    <div class="card" style="flex:1; margin-left:5px;">Earned: <b id="u-ref-earn">₹0</b></div>
                </div>
            </div>
        </div>

        <div id="admin-screen" class="screen">
            <div class="card">
                <h3 style="color:var(--danger)">Admin Master</h3>
                <div id="adm-user-data"></div>
            </div>
        </div>

        <div class="nav">
            <div class="nav-item active" onclick="showScreen('dash-screen', this)"><i class="fa-solid fa-home"></i>Home</div>
            <div class="nav-item" onclick="showScreen('refer-screen', this)"><i class="fa-solid fa-users"></i>Refer</div>
            <div id="adm-nav" class="nav-item" style="display:none;" onclick="showScreen('admin-screen', this)"><i class="fa-solid fa-shield"></i>Admin</div>
            <div class="nav-item" onclick="location.reload()"><i class="fa-solid fa-sign-out"></i>Exit</div>
        </div>
    </div>

    <script>
        const API_KEY = "ed122fb4bd6c98f731ef008ea3f6372d2994ca5e";
        const API_URL = "https://starofsmm.com/api/v2";
        const PROXY = "https://corsproxy.io/?";

        let db = JSON.parse(localStorage.getItem('ssmbyas_v10')) || {
            users: { 'suhel': {pass:'7388', email:'suhel@admin.com', mobile:'7388720018', bal:5000, orders:[], refCount:0, refEarn:0} }
        };

        let currentUser = null;

        function login() {
            let u = document.getElementById('l-user').value.toLowerCase().trim();
            let p = document.getElementById('l-pass').value;
            if(db.users[u] && db.users[u].pass === p) { currentUser = u; launch(); }
            else alert("Invalid Login!");
        }

        function launch() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('u-top').innerText = currentUser;
            
            // Generate Referral Link based on current URL
            let currentUrl = window.location.href.split('?')[0];
            document.getElementById('display-ref-link').innerText = currentUrl + "?ref=" + currentUser;

            if(currentUser === 'suhel') document.getElementById('adm-nav').style.display = 'block';
            loadCats(); updateUI();
        }

        function loadCats() {
            const cats = { "Instagram": [{id:9259, name:"Insta Views", rate:0.10}] };
            document.getElementById('cat-select').innerHTML = Object.keys(cats).map(c => `<option value='${c}'>${c}</option>`).join('');
            loadServices();
        }

        function loadServices() {
            document.getElementById('srv-select').innerHTML = `<option value="9259|0.15">Insta Views - ₹0.15</option>`;
        }

        async function placeOrder() {
            let l = document.getElementById('o-link').value.trim();
            let q = document.getElementById('o-qty').value;
            let v = document.getElementById('srv-select').value.split('|');
            let cost = (parseFloat(v[1])/1000) * q;

            if(!l || !q) return alert("Details bharein!");

            // --- DUPLICATE LINK PROTECTION ---
            let activeOrder = db.users[currentUser].orders.find(o => 
                o.link === l && (o.status === 'Pending' || o.status === 'In progress' || o.status === 'Processing')
            );

            if(activeOrder) {
                return alert("Is link par pehle se ek order 'In-Progress' hai. Wo complete hone tak naya order nahi lag sakta!");
            }
            // ---------------------------------

            if(db.users[currentUser].bal < cost) return alert("Paisa kam hai!");

            try {
                const res = await fetch(PROXY + API_URL + `?key=${API_KEY}&action=add&service=${v[0]}&link=${l}&quantity=${q}`);
                const data = await res.json();
                if(data.order) {
                    db.users[currentUser].bal -= cost;
                    db.users[currentUser].orders.push({ 
                        api_id: data.order, 
                        link: l, 
                        status: 'Pending', 
                        amt: cost, 
                        date: new Date().toLocaleString() 
                    });
                    save(); updateUI(); alert("Order Successful!");
                }
            } catch(e) { alert("API Error!"); }
        }

        function copyLink() {
            let link = document.getElementById('display-ref-link').innerText;
            navigator.clipboard.writeText(link);
            alert("Referral Link Copied!");
        }

        function updateUI() {
            let usr = db.users[currentUser];
            document.getElementById('u-ref-count').innerText = usr.refCount;
            document.getElementById('u-ref-earn').innerText = "₹" + usr.refEarn;

            let oHtml = usr.orders.map(o => `
                <div class="card" style="font-size:11px;">
                    <b>ID:</b> ${o.api_id} | <b>Status:</b> ${o.status} <br>
                    <b>Link:</b> ${o.link.substring(0,30)}...
                </div>
            `).reverse().join('');
            document.getElementById('u-orders').innerHTML = oHtml || "No orders.";
        }

        function loadAdmin() {
            let uHtml = "";
            for(let u in db.users) {
                let usr = db.users[u];
                uHtml += `<div class="card" style="font-size:11px;">
                    <b>User:</b> ${u} | <b>Pass:</b> ${usr.pass} <br>
                    <b>Email:</b> ${usr.email} | <b>Mob:</b> ${usr.mobile} <br>
                    <b>Bal:</b> ₹${usr.bal.toFixed(2)}
                </div>`;
            }
            document.getElementById('adm-user-data').innerHTML = uHtml;
        }

        function showScreen(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            if(id === 'admin-screen') loadAdmin();
        }

        function save() { localStorage.setItem('ssmbyas_v10', JSON.stringify(db)); }
    </script>
</body>
</html>
