<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSMBYAS | Order Sync & News</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #2ea44f; --bg: #ffffff; --card: #f6f8fa; --text: #24292e; --border: #e1e4e8; --success: #2ea44f; --danger: #d73a49; --link: #0366d6; --warning: #f59e0b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 90px; }

        .header { background: #fff; padding: 15px 20px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; align-items: center; }
        .logo-text { font-size: 20px; font-weight: 800; color: #24292e; }

        .screen { display: none; padding: 15px; max-width: 600px; margin: 0 auto; }
        .active { display: block; animation: fadeIn 0.3s; }

        .card { background: var(--card); padding: 18px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 15px; position: relative; }
        .inp { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #d1d5da; margin-bottom: 12px; font-size: 14px; outline: none; }
        .btn { width: 100%; padding: 12px; border-radius: 6px; border: none; background: var(--primary); color: white; font-weight: 700; cursor: pointer; }

        /* NEWS ALERT STYLE */
        .news-box { background: #fff5f5; border: 1px solid #feb2b2; padding: 10px; border-radius: 8px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; color: #c53030; font-size: 12px; font-weight: 600; }
        
        /* STATUS BADGES */
        .badge { padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; float: right; color: white; }
        .status-Pending { background: var(--warning); }
        .status-In-Progress { background: #0366d6; }
        .status-Completed { background: var(--success); }
        .status-Canceled { background: var(--danger); }

        .nav { position: fixed; bottom: 0; width: 100%; max-width: 600px; left: 50%; transform: translateX(-50%); background: #fff; display: flex; border-top: 1px solid var(--border); padding: 10px 0; }
        .nav-item { text-align: center; color: #586069; font-size: 10px; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--link); font-weight: 700; }
        .nav-item i { font-size: 20px; margin-bottom: 3px; display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="header" style="justify-content:center; border:none; padding-top:50px;"><div class="logo-text" style="font-size:35px;">SSMBYAS</div></div>
        <div id="login-area" style="padding:20px; max-width:360px; margin:auto;">
            <div class="card" style="background:#fff;">
                <input type="text" id="l-user" class="inp" placeholder="Username">
                <input type="password" id="l-pass" class="inp" placeholder="Password">
                <button class="btn" onclick="login()">Login Account</button>
            </div>
        </div>
    </div>

    <div id="main-app" style="display:none;">
        <div class="header">
            <div class="logo-text">SSMBYAS</div>
            <div id="u-top" style="font-size:11px; font-weight:700; color:var(--link);">User</div>
        </div>

        <div id="dash-screen" class="screen">
            <div class="news-box">
                <i class="fa-solid fa-bullhorn"></i>
                <marquee id="adm-news">Welcome to SSMBYAS! All services are active and fast.</marquee>
            </div>

            <div class="card" style="display:flex; justify-content:space-around; text-align:center;">
                <div><small>Balance</small><h3 id="u-bal">₹0</h3></div>
                <div><small>Spent</small><h3 id="u-spent">₹0</h3></div>
            </div>

            <div class="card">
                <h4>New Order</h4>
                <select id="cat-select" class="inp" onchange="loadServices()"></select>
                <select id="srv-select" class="inp" onchange="calcPrice()"></select>
                <input type="text" id="o-link" class="inp" placeholder="Link">
                <input type="number" id="o-qty" class="inp" placeholder="Quantity" oninput="calcPrice()">
                <div style="text-align:center; padding:10px; font-weight:700;" id="o-charge">₹0.00</div>
                <button class="btn" onclick="placeOrder()">Place Order</button>
            </div>

            <h4 style="margin:15px 0 10px;">My Recent Orders</h4>
            <div id="u-orders"></div>
        </div>

        <div id="admin-screen" class="screen">
            <div class="card">
                <h3 style="color:var(--danger)">Admin Master</h3>
                <button class="btn" onclick="syncAllOrders()" style="background:var(--link); margin:10px 0;">🔄 Sync All API Orders</button>
                
                <label>Set News Message:</label>
                <input type="text" id="new-news" class="inp" placeholder="Update news here...">
                <button class="btn" onclick="updateNews()" style="padding:5px; margin-bottom:20px;">Update News</button>

                <h4>Pending Payments</h4>
                <div id="adm-pending-list"></div>
            </div>
        </div>

        <div class="nav">
            <div class="nav-item active" onclick="showScreen('dash-screen', this)"><i class="fa-solid fa-home"></i>Home</div>
            <div class="nav-item" onclick="showScreen('admin-screen', this)" id="adm-nav" style="display:none;"><i class="fa-solid fa-user-gear"></i>Admin</div>
            <div class="nav-item" onclick="location.reload()"><i class="fa-solid fa-sign-out-alt"></i>Exit</div>
        </div>
    </div>

    <script>
        const API_KEY = "ed122fb4bd6c98f731ef008ea3f6372d2994ca5e";
        const API_URL = "https://starofsmm.com/api/v2";
        const PROXY = "https://corsproxy.io/?";

        let db = JSON.parse(localStorage.getItem('ssmbyas_v8')) || {
            users: { 'suhel': {pass:'7388', bal:5000, orders:[], funds:[]} },
            pendingFunds: [],
            news: "Welcome to SSMBYAS! Use referral code to earn 5% bonus.",
            config: { margin: 2.0 }
        };

        let currentUser = null;

        function login() {
            let u = document.getElementById('l-user').value.toLowerCase().trim();
            let p = document.getElementById('l-pass').value;
            if(db.users[u] && db.users[u].pass === p) { currentUser = u; launch(); }
        }

        function launch() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('u-top').innerText = currentUser;
            document.getElementById('adm-news').innerText = db.news;
            if(currentUser === 'suhel') document.getElementById('adm-nav').style.display = 'block';
            loadCats(); updateUI();
        }

        function loadCats() {
            const cats = { "Instagram": [{id:9259, name:"Insta Views", rate:0.07}] };
            document.getElementById('cat-select').innerHTML = Object.keys(cats).map(c => `<option value='${c}'>${c}</option>`).join('');
            loadServices();
        }

        function loadServices() {
            const services = [{id:9259, name:"Premium Views", rate:0.10}];
            document.getElementById('srv-select').innerHTML = services.map(s => `<option value='${s.id}|${s.rate+db.config.margin}'>${s.name}</option>`).join('');
        }

        async function placeOrder() {
            let v = document.getElementById('srv-select').value.split('|');
            let q = document.getElementById('o-qty').value;
            let l = document.getElementById('o-link').value;
            let cost = (parseFloat(v[1])/1000) * q;

            if(db.users[currentUser].bal < cost) return alert("Low Balance!");

            try {
                const res = await fetch(PROXY + API_URL + `?key=${API_KEY}&action=add&service=${v[0]}&link=${l}&quantity=${q}`);
                const data = await res.json();
                if(data.order) {
                    db.users[currentUser].bal -= cost;
                    db.users[currentUser].orders.push({ 
                        api_id: data.order, 
                        amt: cost, 
                        status: 'Pending', 
                        date: new Date().toLocaleString() 
                    });
                    save(); updateUI(); alert("Order Placed!");
                }
            } catch(e) { console.error(e); }
        }

        // --- ORDER SYNC LOGIC ---
        async function syncAllOrders() {
            alert("Syncing started... Please wait.");
            for(let u in db.users) {
                for(let order of db.users[u].orders) {
                    if(order.status !== 'Completed' && order.status !== 'Canceled') {
                        try {
                            const res = await fetch(PROXY + API_URL + `?key=${API_KEY}&action=status&order=${order.api_id}`);
                            const data = await res.json();
                            if(data.status) {
                                // API statuses: Pending, In progress, Completed, Partial, Canceled, Processing
                                order.status = data.status;
                            }
                        } catch(e) { console.log("Sync error for order "+order.api_id); }
                    }
                }
            }
            save(); updateUI(); alert("All orders synced with API!");
        }

        function updateNews() {
            db.news = document.getElementById('new-news').value;
            document.getElementById('adm-news').innerText = db.news;
            save(); alert("News updated!");
        }

        function updateUI() {
            let usr = db.users[currentUser];
            document.getElementById('u-bal').innerText = "₹" + usr.bal.toFixed(2);
            
            let oHtml = usr.orders.map(o => `
                <div class="card" style="font-size:12px; margin-bottom:8px; background:#fff;">
                    <span class="badge status-${o.status.replace(' ', '-')}">${o.status}</span>
                    <b>ID:</b> ${o.api_id} | ₹${o.amt.toFixed(2)} <br>
                    <small>${o.date}</small>
                </div>
            `).reverse().join('');
            document.getElementById('u-orders').innerHTML = oHtml || "No orders yet.";
        }

        function showScreen(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            if(id === 'admin-screen') loadAdmin();
        }

        function save() { localStorage.setItem('ssmbyas_v8', JSON.stringify(db)); }
    </script>
</body>
</html>
