<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HACKER X KING</title>
    <style>
        :root {
            --primary: #FF4D4D;
            --secondary: #B31217;
            --accent: #00E676;
            --gold: #FFD700;
            --dark: #121212;
            --light: #FFFFFF;
            --card-bg: rgba(20, 20, 20, 0.97);
            --glass: rgba(255, 255, 255, 0.15);
            --telegram-blue: #0088CC;
        }
        
        @font-face {
            font-family: 'Rajdhani';
            src: url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap');
        }
        
        body {
            font-family: 'Rajdhani', sans-serif;
            background: radial-gradient(circle at center, #000000, #121212);
            color: var(--light);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }
        
        /* Login Page */
        .login-container {
            width: 95%;
            max-width: 350px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 
                0 0 20px rgba(255, 77, 77, 0.3),
                inset 0 0 10px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass);
            padding: 30px;
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }
        
        .login-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--light);
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        
        .login-input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 10px;
            border: 2px solid var(--glass);
            background: rgba(0, 0, 0, 0.5);
            color: white;
            font-size: 16px;
            outline: none;
            font-weight: 600;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.7);
            transition: all 0.3s;
        }
        
        .login-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(255, 77, 77, 0.5);
        }
        
        .login-button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 77, 77, 0.5);
            transition: all 0.3s;
        }
        
        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(255, 77, 77, 0.7);
        }
        
        /* Main Dashboard (hidden initially) */
        .dashboard {
            display: none;
            width: 95%;
            max-width: 400px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 
                0 0 20px rgba(255, 77, 77, 0.3),
                inset 0 0 10px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass);
            position: relative;
            margin: 20px;
            animation: fadeIn 0.5s ease-out;
        }
        
        /* Header */
        .header {
            padding: 20px;
            background: linear-gradient(135deg, 
                rgba(255, 77, 77, 0.8), 
                rgba(179, 18, 23, 0.8));
            text-align: center;
            border-bottom: 1px solid var(--glass);
        }
        
        .title {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
            color: white;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
            margin: 0;
        }
        
        /* Input Section */
        .input-section {
            padding: 20px;
            border-bottom: 1px solid var(--glass);
            text-align: center;
        }
        
        .period-input {
            width: 140px;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid var(--glass);
            background: rgba(0, 0, 0, 0.5);
            color: white;
            font-size: 24px;
            text-align: center;
            outline: none;
            font-weight: 700;
            margin: 0 auto;
            display: block;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.7);
        }
        
        /* Prediction Display */
        .prediction-display {
            padding: 25px;
            position: relative;
            min-height: 200px;
        }
        
        .ultimate-orb {
            width: 200px;
            height: 200px;
            margin: 0 auto;
            border-radius: 50%;
            background: radial-gradient(circle at center, 
                rgba(30, 30, 30, 0.9) 0%, 
                rgba(18, 18, 18, 0.9) 70%);
            border: 6px solid var(--primary);
            box-shadow: 
                inset 0 0 30px rgba(0, 0, 0, 0.9),
                0 0 40px rgba(255, 77, 77, 0.5);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        
        .ultimate-orb.green {
            border-color: var(--accent);
            box-shadow: 
                inset 0 0 30px rgba(0, 0, 0, 0.9),
                0 0 40px rgba(0, 230, 118, 0.5);
        }
        
        .prediction-content {
            text-align: center;
            width: 100%;
        }
        
        .prediction-label {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        
        .prediction-number {
            font-size: 50px;
            font-weight: 700;
            color: white;
            text-shadow: 0 0 10px currentColor;
            margin-top: 5px;
        }
        
        .red-label {
            color: var(--primary);
            text-shadow: 0 0 8px var(--primary);
        }
        
        .green-label {
            color: var(--accent);
            text-shadow: 0 0 8px var(--accent);
        }
        
        .sure-badge {
            position: absolute;
            bottom: 20px;
            background: rgba(255, 215, 0, 0.2);
            color: var(--gold);
            padding: 6px 15px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid rgba(255, 215, 0, 0.4);
        }
        
        /* Action Button */
        .action-button {
            width: calc(100% - 40px);
            margin: 0 20px 20px;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(to right, 
                var(--primary), 
                var(--secondary));
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(255, 77, 77, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* Status Message */
        .status-message {
            text-align: center;
            padding: 10px;
            font-size: 14px;
            min-height: 18px;
            font-weight: 600;
        }
        
        /* Footer */
        .footer {
            text-align: center;
            padding: 15px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            border-top: 1px solid var(--glass);
        }
        
        /* Popup */
        .popup {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        
        .popup-content {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            max-width: 300px;
            border: 1px solid var(--glass);
            box-shadow: 0 0 30px rgba(255, 77, 77, 0.5);
            transform: scale(0.9);
            transition: transform 0.3s;
        }
        
        .popup.show {
            opacity: 1;
            pointer-events: all;
        }
        
        .popup.show .popup-content {
            transform: scale(1);
        }
        
        .popup-title {
            color: var(--primary);
            font-size: 20px;
            margin-bottom: 15px;
        }
        
        .popup-message {
            margin-bottom: 20px;
        }
        
        .popup-button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .popup-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(255, 77, 77, 0.5);
        }

        /* Telegram FAB (Floating Action Button) */
        #telegramFab {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background-color: var(--telegram-blue);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s, box-shadow 0.3s;
            z-index: 99;
            animation: pulse 2s infinite ease-in-out;
        }

        #telegramFab:hover {
            transform: scale(1.1) translateY(-2px);
            box-shadow: 0 7px 20px rgba(0, 0, 0, 0.6);
        }

        #telegramFab img {
            width: 30px;
            height: 30px;
        }
        
        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        
        /* Special Prediction Indicator */
        .special-prediction {
            margin-top: 10px;
            font-size: 12px;
            color: var(--gold);
            text-shadow: 0 0 5px var(--gold);
            font-weight: 600;
        }
    </style>

</head>
