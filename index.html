<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSMBYAS | Professional Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #2ea44f; --bg: #ffffff; --card: #f6f8fa; --text: #24292e; --border: #e1e4e8; --success: #2ea44f; --danger: #d73a49; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 90px; }

        /* HEADER & LOGO */
        .header { background: #fff; padding: 15px 20px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; align-items: center; }
        .logo-text { font-size: 22px; font-weight: 800; color: #24292e; letter-spacing: -1px; }

        /* AUTH & SCREENS */
        .auth-container { min-height: 100vh; background: #f6f8fa; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: #fff; padding: 30px; border-radius: 12px; width: 100%; max-width: 360px; border: 1px solid var(--border); box-shadow: 0 8px 24px rgba(0,0,0,0.05); }
        .screen { display: none; padding: 15px; max-width: 600px; margin: 0 auto; }
        .active { display: block; animation: fadeIn 0.3s; }

        /* UI ELEMENTS */
        .card { background: var(--card); padding: 20px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 15px; }
        .inp, select { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #d1d5da; margin-bottom: 12px; font-size: 14px; outline: none; }
        .inp:focus { border-color: #0366d6; box-shadow: 0 0 0 3px rgba(3,102,214,0.2); }
        .btn { width: 100%; padding: 12px; border-radius: 6px; border: none; background: var(--primary); color: white; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn:active { transform: scale(0.98); }

        /* ADMIN DASHBOARD */
        .adm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .adm-box { background: #fff; padding: 15px; border: 1px solid var(--border); border-radius: 8px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .adm-box h4 { font-size: 20px; color: #24292e; font-weight: 700; }
        .adm-box small { color: #586069; font-size: 11px; font-weight: 600; text-transform: uppercase; }

        /* POPUP NOTIFICATION */
        .popup-msg { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); color: white; padding: 14px 25px; border-radius: 10px; font-weight: 600; z-index: 9999; box-shadow: 0 10px 30px rgba(0,0,0,0.15); display: flex; align-items: center; gap: 10px; animation: slideDown 0.4s; }
        
        /* NAVIGATION */
        .nav { position: fixed; bottom: 0; width: 100%; max-width: 600px; left: 50%; transform: translateX(-50%); background: #fff; display: flex; border-top: 1px solid var(--border); padding: 12px 5px; justify-content: space-around; }
        .nav-item { text-align: center; color: #586069; font-size: 10px; cursor: pointer; flex: 1; }
        .nav-item.active { color: #0366d6; font-weight: 700; }
        .nav-item i { font-size: 20px; margin-bottom: 3px; display: block; }

        /* LIST ITEMS */
        .list-item { background: #fff; padding: 12px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 10px; font-size: 13px; line-height: 1.6; }
        .badge { padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; color: white; float: right; }
        .badge-pending { background: #f59e0b; }
        .badge-success { background: #2ea44f; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideDown { from { top: -100px; } to { top: 20px; } }
    </style>
</head>
<body>

    <div id="auth-screen" class="auth-container">
        <div class="logo-text" style="margin-bottom: 20px;">SSMBYAS</div>
        <div class="auth-card" id="login-box">
            <h2 style="font-size:18px; text-align:center; margin-bottom:20px;">Sign In</h2>
            <input type="text" id="l-user" class="inp" placeholder="Username">
            <input type="password" id="l-pass" class="inp" placeholder="Password">
            <button class="btn" onclick="login()">Login</button>
            <p onclick="toggleAuth(true)" style="text-align:center; margin-top:20px; font-size:13px; color:#0366d6; cursor:pointer;">New user? Register</p>
        </div>

        <div class="auth-card" id="reg-box" style="display:none;">
            <h2 style="font-size:18px; text-align:center; margin-bottom:20px;">Create Account</h2>
            <input type="text" id="r-user" class="inp" placeholder="Username">
            <input type="email" id="r-email" class="inp" placeholder="Email Address">
            <input type="number" id="r-mobile" class="inp" placeholder="Phone Number">
            <input type="password" id="r-pass" class="inp" placeholder="Password">
            <button class="btn" onclick="register()">Register</button>
            <p onclick="toggleAuth(false)" style="text-align:center; margin-top:20px; font-size:13px; color:#0366d6; cursor:pointer;">Already have account? Login</p>
        </div>
    </div>

    <div id="main-app" style="display:none;">
        <div class="header">
            <div class="logo-text" style="font-size:18px;">SSMBYAS</div>
            <div id="u-top" style="color:#0366d6; font-size:12px; font-weight:600;">Guest</div>
        </div>

        <div id="dash-screen" class="screen">
            <div class="adm-grid">
                <div class="adm-box"><small>My Balance</small><h4 id="u-bal">₹0</h4></div>
                <div class="adm-box"><small>Total Spent</small><h4 id="u-spent">₹0</h4></div>
            </div>
            <div class="card" style="background:#fff;">
                <h3><i class="fa-solid fa-cart-plus" style="color:var(--primary)"></i> New Order</h3>
                <label style="font-size:12px; font-weight:600;">Category</label>
                <select id="cat-select" onchange="loadServices()"></select>
                <label style="font-size:12px; font-weight:600;">Service</label>
                <select id="srv-select" onchange="calcPrice()"></select>
                <input type="text" id="o-link" class="inp" placeholder="Paste Link Here">
                <input type="number" id="o-qty" class="inp" placeholder="Quantity (Min 100)" oninput="calcPrice()">
                <div style="background:var(--card); padding:15px; text-align:center; border-radius:8px; margin-bottom:12px; border:1px solid var(--border);">
                    <h2 id="o-charge" style="color:#24292e;">₹0.00</h2>
                </div>
                <button class="btn" onclick="placeOrder()">Place Order Now</button>
            </div>
        </div>

        <div id="fund-screen" class="screen">
            <div class="card" style="text-align:center; background:#fff;">
                <h3>Add Money</h3>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=upi://pay?pa=suhel@upi&pn=SSMBYAS" style="width:140px; margin:15px 0; border:1px solid #eee; padding:5px;">
                <p style="font-size:12px; font-weight:700; color:#586069;">UPI ID: suhel@upi</p>
                <input type="number" id="f-amt" class="inp" placeholder="Enter Amount (₹)" style="margin-top:15px;">
                <input type="text" id="f-utr" class="inp" placeholder="Enter 12-Digit UTR Number">
                <button class="btn" onclick="submitFund()" style="background:#0366d6;">Submit Payment</button>
            </div>
            <h4 style="margin-bottom:10px;">My Deposits</h4>
            <div id="u-fund-hist"></div>
        </div>

        <div id="admin-screen" class="screen">
            <div class="card" style="border-top:5px solid var(--danger); background:#fff;">
                <h3 style="color:var(--danger)"><i class="fa-solid fa-user-shield"></i> Admin Master</h3>
                <div class="adm-grid" style="margin-top:10px;">
                    <div class="adm-box"><small>Total Users</small><h4 id="adm-total-u">0</h4></div>
                    <div class="adm-box"><small>Today's New</small><h4 id="adm-today-u">0</h4></div>
                </div>

                <h4 style="margin:20px 0 10px; color:#0366d6;"><i class="fa-solid fa-clock-rotate-left"></i> Pending Payments</h4>
                <div id="adm-pending-payments"></div>

                <h4 style="margin:20px 0 10px;"><i class="fa-solid fa-users"></i> User Database</h4>
                <div id="adm-user-list"></div>
            </div>
        </div>

        <div class="nav">
            <div class="nav-item active" onclick="showScreen('dash-screen', this)"><i class="fa-solid fa-house"></i>Home</div>
            <div class="nav-item" onclick="showScreen('fund-screen', this)"><i class="fa-solid fa-wallet"></i>Add Funds</div>
            <div id="adm-nav" class="nav-item" style="display:none;" onclick="showScreen('admin-screen', this)"><i class="fa-solid fa-shield-halved"></i>Admin</div>
            <div class="nav-item" onclick="location.reload()"><i class="fa-solid fa-sign-out-alt"></i>Logout</div>
        </div>
    </div>

    <script>
        const API_KEY = "ed122fb4bd6c98f731ef008ea3f6372d2994ca5e";
        const API_URL = "https://starofsmm.com/api/v2";
        const PROXY = "https://corsproxy.io/?";

        let db = JSON.parse(localStorage.getItem('ssmbyas_v5_final')) || {
            users: { 'suhel': {pass:'7388', email:'suhel@admin.com', mobile:'7388720018', bal:10000, spent:0, orders:[], funds:[], date: new Date().toLocaleDateString()} },
            pendingFunds: [],
            config: { margin: 2.0 }
        };

        let currentUser = null;

        function showMsg(m, type='success') {
            const old = document.querySelector('.popup-msg'); if(old) old.remove();
            let d = document.createElement('div');
            d.className = `popup-msg`;
            d.style.background = type === 'success' ? '#2ea44f' : '#d73a49';
            d.innerHTML = `<i class="fa-solid ${type==='success'?'fa-check-circle':'fa-circle-xmark'}"></i> ` + m;
            document.body.appendChild(d);
            setTimeout(() => d.remove(), 3500);
        }

        function toggleAuth(r) {
            document.getElementById('login-box').style.display = r ? 'none' : 'block';
            document.getElementById('reg-box').style.display = r ? 'block' : 'none';
        }

        function register() {
            let u = document.getElementById('r-user').value.toLowerCase().trim();
            let e = document.getElementById('r-email').value;
            let m = document.getElementById('r-mobile').value;
            let p = document.getElementById('r-pass').value;

            if(!u || !e || !m || !p) return showMsg("Saare fields bharna zaroori hai!", "error");
            if(db.users[u]) return showMsg("Ye Username pehle se hai!", "error");

            db.users[u] = { pass:p, email:e, mobile:m, bal:0, spent:0, orders:[], funds:[], date: new Date().toLocaleDateString() };
            save(); showMsg("Account ban gaya! Ab Login karein."); toggleAuth(false);
        }

        function login() {
            let u = document.getElementById('l-user').value.toLowerCase().trim();
            let p = document.getElementById('l-pass').value;
            if(db.users[u] && db.users[u].pass === p) { currentUser = u; launch(); }
            else showMsg("Username ya Password ghalat hai!", "error");
        }

        function launch() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('u-top').innerText = currentUser;
            if(currentUser === 'suhel') document.getElementById('adm-nav').style.display = 'block';
            
            // Load Demo Categories
            const cats = { "Instagram": [{id:9259, name:"Insta Views", rate:0.05}], "YouTube": [{id:221, name:"YT Subs", rate:180}] };
            document.getElementById('cat-select').innerHTML = Object.keys(cats).map(c => `<option value='${c}'>${c}</option>`).join('');
            loadServices();
            updateUI();
        }

        function loadServices() {
            const services = [{id:9259, name:"Instagram Views [High Speed]", rate:0.08}, {id:221, name:"YouTube Subscribers [Real]", rate:210}];
            let m = db.config.margin;
            document.getElementById('srv-select').innerHTML = services.map(s => `<option value='${s.id}|${s.rate+m}'>${s.name} - ₹${(s.rate+m).toFixed(2)}</option>`).join('');
            calcPrice();
        }

        function calcPrice() {
            let v = document.getElementById('srv-select').value.split('|');
            let q = document.getElementById('o-qty').value || 0;
            let cost = (parseFloat(v[1])/1000) * q;
            document.getElementById('o-charge').innerText = "₹" + cost.toFixed(2);
        }

        async function placeOrder() {
            let v = document.getElementById('srv-select').value.split('|');
            let q = document.getElementById('o-qty').value;
            let l = document.getElementById('o-link').value;
            let cost = (parseFloat(v[1])/1000) * q;

            if(!l || q < 10) return showMsg("Sahi Link aur Quantity daalein!", "error");
            if(db.users[currentUser].bal < cost) return showMsg("Paisa kam hai! Recharge karein.", "error");

            try {
                const res = await fetch(PROXY + API_URL + `?key=${API_KEY}&action=add&service=${v[0]}&link=${l}&quantity=${q}`);
                const data = await res.json();
                if(data.order) {
                    db.users[currentUser].bal -= cost;
                    db.users[currentUser].spent += cost;
                    db.users[currentUser].orders.push({id: data.order, amt: cost, srv: v[0], date: new Date().toLocaleDateString()});
                    save(); showMsg("SUCCESS! Your Order Placed Successfully."); updateUI();
                    document.getElementById('o-link').value = ""; document.getElementById('o-qty').value = "";
                } else showMsg("API Error: " + data.error, "error");
            } catch(e) { showMsg("Connection Error!", "error"); }
        }

        // --- FUND LOGIC ---
        function submitFund() {
            let a = parseFloat(document.getElementById('f-amt').value);
            let u = document.getElementById('f-utr').value;
            if(!a || u.length < 10) return showMsg("UTR Number sahi se likhein!", "error");
            
            let req = { user: currentUser, amt: a, utr: u, date: new Date().toLocaleDateString(), status: 'Pending' };
            db.pendingFunds.push(req);
            db.users[currentUser].funds.push(req);
            save(); 
            showMsg("Request bhej di gayi hai! Admin thodi der mein approve karega.");
            updateUI();
            document.getElementById('f-amt').value = ""; document.getElementById('f-utr').value = "";
        }

        function updateUI() {
            document.getElementById('u-bal').innerText = "₹" + db.users[currentUser].bal.toFixed(2);
            document.getElementById('u-spent').innerText = "₹" + db.users[currentUser].spent.toFixed(2);
            
            let hHtml = db.users[currentUser].funds.map(f => `
                <div class="list-item">₹${f.amt} - ${f.utr} <span class="badge badge-${f.status==='Pending'?'pending':'success'}">${f.status}</span></div>
            `).reverse().join('');
            document.getElementById('u-fund-hist').innerHTML = hHtml || "No deposits yet.";
        }

        // --- ADMIN DASHBOARD ---
        function loadAdmin() {
            let totalU = Object.keys(db.users).length;
            let today = new Date().toLocaleDateString();
            let todayU = Object.values(db.users).filter(u => u.date === today).length;

            document.getElementById('adm-total-u').innerText = totalU;
            document.getElementById('adm-today-u').innerText = todayU;

            // Pending Payments
            let pthml = db.pendingFunds.map((p, i) => `
                <div class="list-item" style="border-left:4px solid #f59e0b;">
                    <b>User:</b> ${p.user} | <b>Amount:</b> ₹${p.amt} <br>
                    <b>UTR:</b> ${p.utr} <br>
                    <button onclick="approveFund(${i})" style="background:var(--success); color:#fff; border:none; padding:5px 10px; border-radius:4px; margin-top:5px; font-size:11px;">Approve Now</button>
                    <button onclick="rejectFund(${i})" style="background:var(--danger); color:#fff; border:none; padding:5px 10px; border-radius:4px; margin-top:5px; font-size:11px;">Reject</button>
                </div>
            `).join('');
            document.getElementById('adm-pending-payments').innerHTML = pthml || "No pending payments.";

            // Detailed User List
            let uHtml = "";
            for(let u in db.users) {
                let usr = db.users[u];
                uHtml += `<div class="list-item">
                    <b>ID:</b> ${u} | <b>Pass:</b> ${usr.pass} <br>
                    <b>Email:</b> ${usr.email} | <b>Mob:</b> ${usr.mobile} <br>
                    <b>Wallet:</b> ₹${usr.bal.toFixed(2)} | <b>Spent:</b> ₹${usr.spent.toFixed(2)}
                </div>`;
            }
            document.getElementById('adm-user-list').innerHTML = uHtml;
        }

        function approveFund(idx) {
            let p = db.pendingFunds[idx];
            db.users[p.user].bal += p.amt;
            // Update user's history status
            db.users[p.user].funds.forEach(f => { if(f.utr === p.utr) f.status = 'Success'; });
            db.pendingFunds.splice(idx, 1);
            save(); loadAdmin(); showMsg("Payment Approved Successfully!");
        }

        function rejectFund(idx) {
            let p = db.pendingFunds[idx];
            db.users[p.user].funds.forEach(f => { if(f.utr === p.utr) f.status = 'Rejected'; });
            db.pendingFunds.splice(idx, 1);
            save(); loadAdmin(); showMsg("Payment Rejected!", "error");
        }

        function showScreen(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            if(id === 'admin-screen') loadAdmin();
        }
        function save() { localStorage.setItem('ssmbyas_v5_final', JSON.stringify(db)); }
    </script>
</body>
</html>
