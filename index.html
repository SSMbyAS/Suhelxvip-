<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMMbyAS - Smart Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #3b82f6; --bg: #f3f4f6; --card: #ffffff; --success: #22c55e; --dark: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .screen { display: none; width: 100%; max-width: 480px; padding: 15px; box-sizing: border-box; animation: fadeIn 0.3s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .auth-card { background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; margin-top: 50px; }
        .top-nav { display: flex; justify-content: space-around; background: var(--card); padding: 15px 0; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .nav-item { text-align: center; color: #64748b; cursor: pointer; font-size: 11px; flex: 1; }
        .nav-item i { display: block; font-size: 18px; margin-bottom: 5px; color: var(--primary); }
        .nav-item.active-nav { color: var(--primary); font-weight: bold; border-bottom: 2px solid var(--primary); }
        .card { background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #d1d5db; margin-bottom: 12px; box-sizing: border-box; outline: none; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-green { background: var(--success); color: white; }
        .loading { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active">
        <div class="auth-card">
            <h2 style="color:var(--primary)">SMMbyAS</h2>
            <input type="text" id="l-user" placeholder="Username">
            <input type="password" id="l-pass" placeholder="Password">
            <button class="btn btn-blue" onclick="doLogin()">Login</button>
            <span style="color:var(--primary); cursor:pointer; font-size:13px; display:block; margin-top:15px;" onclick="toggleScreen('signup-screen')">New User? Create Account</span>
        </div>
    </div>

    <div id="signup-screen" class="screen">
        <div class="auth-card">
            <h2>Sign Up</h2>
            <input type="text" id="s-phone" placeholder="WhatsApp Number">
            <input type="text" id="s-user" placeholder="Choose Username">
            <input type="password" id="s-pass" placeholder="Set Password">
            <button class="btn btn-green" onclick="doSignup()">Register</button>
            <span style="color:var(--primary); cursor:pointer; font-size:13px; display:block; margin-top:15px;" onclick="toggleScreen('login-screen')">Back to Login</span>
        </div>
    </div>

    <div id="user-panel" class="screen">
        <div class="top-nav">
            <div class="nav-item active-nav" onclick="showTab('order-tab', this)"><i class="fas fa-shopping-cart"></i>Order</div>
            <div class="nav-item" onclick="showTab('funds-tab', this)"><i class="fas fa-plus-circle"></i>Funds</div>
            <div class="nav-item" onclick="location.reload()"><i class="fas fa-sign-out-alt"></i>Logout</div>
        </div>

        <div class="card" style="background: linear-gradient(135deg, #1e40af, #3b82f6); color:white;">
            <p style="margin:0; font-size:11px; opacity:0.8;">WELCOME, <span id="displayUser">USER</span></p>
            <h2 style="margin:5px 0 0;" id="userBalDisplay">₹0.00</h2>
        </div>

        <div id="order-tab" class="tab-content active">
            <div class="card">
                <h3>New Order</h3>
                <input type="text" id="orderLink" placeholder="Paste link here...">
                <select id="serviceSelect" onchange="updatePriceText()">
                    <option value="0">-- Select --</option>
                    <option value="4">Instagram Views (10k) - ₹4</option>
                    <option value="35">Instagram Followers (1k) - ₹35</option>
                    <option value="150">YouTube Subscribers (1k) - ₹150</option>
                </select>
                <p id="priceLabel" style="font-weight:bold; color:var(--primary);"></p>
                <button class="btn btn-blue" id="orderBtn" onclick="placeOrder()">Place Order</button>
            </div>
        </div>

        <div id="funds-tab" class="tab-content" style="display:none;">
            <div class="card">
                <h3>Add Funds</h3>
                <input type="number" id="depositAmt" placeholder="Amount (Min ₹10)" oninput="genQR()">
                <div id="qrContainer" style="display:none; text-align:center;">
                    <img id="qrImg" style="width:180px; margin:10px 0; border:1px solid #ddd;">
                    <input type="text" id="utrInput" placeholder="12 Digit UTR">
                    <button class="btn btn-green" onclick="sendRequest()">Send WhatsApp Request</button>
                </div>
            </div>
        </div>
    </div>

    <div id="admin-panel" class="screen">
        <div class="card" style="background:var(--dark); color:white; text-align:center;"><h3>Admin Control</h3></div>
        <div class="card">
            <h4>Update User Balance</h4>
            <input type="text" id="admTarget" placeholder="Username">
            <input type="number" id="admAmount" placeholder="Amount">
            <button class="btn btn-green" onclick="adminAddBal()">Add Balance</button>
            <button class="btn" style="margin-top:10px; background:#ddd;" onclick="location.reload()">Exit Admin</button>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('smm_db')) || {};
        let sessionUser = null;
        // Updated URL from User
        const sheetURL = "https://script.google.com/macros/s/AKfycbxRPNReLWFEz8FNOqEA02sqQORMHFuL7E790bdoqVhynbme6pJXJ3t3jaf4qv6JFUPsAQ/exec";

        function toggleScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function showTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
            document.getElementById(id).style.display = 'block';
            el.classList.add('active-nav');
        }

        function doSignup() {
            const u = document.getElementById('s-user').value.trim();
            const p = document.getElementById('s-pass').value.trim();
            const ph = document.getElementById('s-phone').value.trim();
            if(!u || !p || !ph) return alert("All fields required!");
            db[u] = { pass: p, phone: ph, bal: 0.00 };
            localStorage.setItem('smm_db', JSON.stringify(db));
            alert("Signup Success!"); toggleScreen('login-screen');
        }

        function doLogin() {
            const u = document.getElementById('l-user').value.trim();
            const p = document.getElementById('l-pass').value.trim();
            if(u === "admin" && p === "suhel7388") { toggleScreen('admin-panel'); return; }
            if(db[u] && db[u].pass === p) {
                sessionUser = u;
                document.getElementById('displayUser').innerText = u.toUpperCase();
                updateUserUI();
                toggleScreen('user-panel');
            } else { alert("Login Failed!"); }
        }

        function updateUserUI() {
            document.getElementById('userBalDisplay').innerText = "₹" + db[sessionUser].bal.toFixed(2);
        }

        function placeOrder() {
            const btn = document.getElementById('orderBtn');
            const cost = parseFloat(document.getElementById('serviceSelect').value);
            const link = document.getElementById('orderLink').value.trim();
            const srvName = document.getElementById('serviceSelect').options[document.getElementById('serviceSelect').selectedIndex].text;

            if(cost === 0 || !link) return alert("Fill link and select service!");
            if(db[sessionUser].bal < cost) return alert("Low Balance!");

            btn.innerText = "Processing...";
            btn.classList.add('loading');

            // Send data to Google Sheets
            fetch(sheetURL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    user: sessionUser,
                    service: srvName,
                    link: link,
                    price: cost
                })
            }).then(() => {
                db[sessionUser].bal -= cost;
                localStorage.setItem('smm_db', JSON.stringify(db));
                updateUserUI();
                alert("Order Placed! Details sent to Sheet. ✅");
                btn.innerText = "Place Order";
                btn.classList.remove('loading');
                document.getElementById('orderLink').value = "";
            }).catch(err => {
                alert("Error! Check internet.");
                btn.innerText = "Place Order";
                btn.classList.remove('loading');
            });
        }

        function adminAddBal() {
            const u = document.getElementById('admTarget').value.trim();
            const a = parseFloat(document.getElementById('admAmount').value);
            if(!db[u]) return alert("User not found!");
            db[u].bal += a;
            localStorage.setItem('smm_db', JSON.stringify(db));
            alert("Balance added!");
        }

        function updatePriceText() {
            const p = document.getElementById('serviceSelect').value;
            document.getElementById('priceLabel').innerText = p > 0 ? "Cost: ₹" + p : "";
        }

        function genQR() {
            const a = document.getElementById('depositAmt').value;
            if(a >= 10) {
                document.getElementById('qrContainer').style.display = "block";
                document.getElementById('qrImg').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=7388720012@fam%26am=${a}%26cu=INR`;
            }
        }

        function sendRequest() {
            const a = document.getElementById('depositAmt').value;
            const utr = document.getElementById('utrInput').value;
            if(utr.length < 12) return alert("Invalid UTR!");
            window.open(`https://wa.me/917388720012?text=User: ${sessionUser}, ₹${a}, UTR: ${utr}`);
        }
    </script>
</body>
</html>
