<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMMbyAS - Pro Admin Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #007bff; --bg: #f4f7fe; --card: #ffffff; --success: #10b981; --danger: #ef4444; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .screen { display: none; width: 100%; max-width: 500px; margin: 0 auto; min-height: 100vh; background: #fff; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        .active { display: block; }
        
        /* Navigation */
        .top-nav { display: flex; background: #fff; padding: 12px 0; border-bottom: 1px solid #eee; position: sticky; top:0; z-index:100; }
        .nav-item { flex: 1; text-align: center; color: #999; font-size: 10px; cursor: pointer; font-weight: bold; }
        .nav-item.active-nav { color: var(--primary); }
        .nav-item i { display: block; font-size: 20px; margin-bottom: 3px; }

        .balance-card { background: linear-gradient(135deg, #4f46e5, #3b82f6); color: white; margin: 15px; padding: 25px; border-radius: 20px; text-align: center; }
        .card { background: #fff; margin: 15px; padding: 20px; border-radius: 18px; border: 1px solid #f0f0f0; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 0 15px; }
        .stat-box { background: #fff; padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #eee; }

        input, select { width: 100%; padding: 14px; border-radius: 10px; border: 1.5px solid #eee; margin-bottom: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-green { background: var(--success); color: white; }
        .btn-red { background: var(--danger); color: white; padding: 5px 10px; width: auto; font-size: 10px; }

        .admin-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .admin-table th, .admin-table td { border: 1px solid #eee; padding: 8px; text-align: left; }
        
        .tab-btn { padding: 8px 15px; border-radius: 20px; border: 1px solid #ddd; background: #fff; cursor: pointer; font-size: 12px; margin-right: 5px; }
        .tab-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active">
        <div style="padding: 40px 30px 10px 30px; font-size: 30px; font-weight: 800; color: var(--primary);">SMMbyAS</div>
        <div style="padding: 30px;">
            <input type="text" id="l-user" placeholder="Username">
            <input type="password" id="l-pass" placeholder="Password">
            <button class="btn btn-blue" onclick="doLogin()">Login</button>
            <p onclick="toggleScreen('signup-screen')" style="text-align:center; color:#666; margin-top:20px; cursor:pointer;">Naya account? <b style="color:var(--primary)">Register</b></p>
        </div>
    </div>

    <div id="signup-screen" class="screen">
        <div class="card" style="margin-top:50px;">
            <h2>Create Account</h2>
            <input type="text" id="s-user" placeholder="Username">
            <input type="email" id="s-email" placeholder="Gmail ID">
            <input type="text" id="s-phone" placeholder="WhatsApp Number">
            <input type="password" id="s-pass" placeholder="Password">
            <button class="btn btn-green" onclick="doSignup()">Sign Up</button>
            <p onclick="toggleScreen('login-screen')" style="text-align:center; margin-top:15px; cursor:pointer;">Login Here</p>
        </div>
    </div>

    <div id="user-panel" class="screen">
        <div class="top-nav">
            <div class="nav-item active-nav" onclick="showTab('order-tab', this)"><i class="fas fa-shopping-bag"></i>Order</div>
            <div class="nav-item" onclick="showTab('funds-tab', this)"><i class="fas fa-wallet"></i>Funds</div>
            <div class="nav-item" onclick="showTab('track-tab', this); loadUserHistory();"><i class="fas fa-history"></i>History</div>
            <div class="nav-item" style="color:red" onclick="location.reload()"><i class="fas fa-sign-out-alt"></i>Exit</div>
        </div>
        <div class="balance-card">
            <div style="font-size:11px; opacity:0.8;">CURRENT BALANCE</div>
            <h1 id="userBalDisplay" style="font-size:45px; margin:5px 0;">₹0.00</h1>
            <div id="displayUser" style="background:rgba(255,255,255,0.2); padding:4px 12px; border-radius:50px; font-size:12px;">USER</div>
        </div>

        <div id="order-tab" class="tab-content active">
            <div class="card">
                <h3>New Order</h3>
                <select id="serviceSelect">
                    <option value="4">Instagram Views (10k) - ₹4</option>
                    <option value="75">Instagram Followers (1k) - ₹75</option>
                    <option value="30">Telegram Members (1k) - ₹30</option>
                </select>
                <input type="text" id="orderLink" placeholder="Paste Link Here">
                <button class="btn btn-blue" onclick="placeOrder()">Place Order</button>
            </div>
        </div>

        <div id="funds-tab" class="tab-content" style="display:none;">
            <div class="card">
                <h3>Add Funds</h3>
                <input type="number" id="payAmount" placeholder="Amount (₹)" oninput="updateQR()">
                <div id="qrBox" style="display:none; text-align:center; margin-bottom:15px;">
                    <img id="qrImg" style="width:180px;"><br>
                    <small>UPI: 7388720012@fam</small>
                </div>
                <input type="text" id="payTxn" placeholder="Transaction ID">
                <button class="btn btn-green" onclick="submitPayment()">Submit Payment</button>
            </div>
        </div>

        <div id="track-tab" class="tab-content" style="display:none;">
            <div class="card"><h4>My Activity</h4><div id="userHistoryList"></div></div>
        </div>
    </div>

    <div id="admin-panel" class="screen">
        <div class="card" style="background:#1e293b; color:white;"><h2>Admin Dashboard</h2></div>
        
        <div class="stats-grid">
            <div class="stat-box"><small>Total Users</small><h2 id="admTotalUsers">0</h2></div>
            <div class="stat-box"><small>Total Bal</small><h2 id="admTotalBal">₹0</h2></div>
        </div>

        <div class="card">
            <div style="margin-bottom:15px;">
                <button class="tab-btn active" onclick="switchAdminTab('users', this)">Users</button>
                <button class="tab-btn" onclick="switchAdminTab('payments', this)">Payments</button>
                <button class="tab-btn" onclick="switchAdminTab('orders', this)">Orders</button>
            </div>

            <div id="adm-users-sec">
                <input type="text" placeholder="Search User..." onkeyup="filterTable(this, 'userTableBody')">
                <div style="overflow-x:auto;">
                    <table class="admin-table">
                        <thead><tr><th>User</th><th>Gmail/Phone</th><th>Bal</th><th>Action</th></tr></thead>
                        <tbody id="userTableBody"></tbody>
                    </table>
                </div>
                <hr>
                <h4>Add Balance</h4>
                <input type="text" id="admTargetUser" placeholder="Username">
                <input type="number" id="admTargetAmt" placeholder="Amount">
                <button class="btn btn-blue" onclick="adminAddBal()">Add Money</button>
            </div>

            <div id="adm-payments-sec" style="display:none;">
                <h4>Payment Requests</h4>
                <div id="adminPaymentList" style="font-size:12px;"></div>
            </div>

            <div id="adm-orders-sec" style="display:none;">
                <h4>Service Orders</h4>
                <div id="adminOrderList" style="font-size:12px;"></div>
            </div>
        </div>
        <button class="btn btn-red" style="margin:15px; width:94%;" onclick="location.reload()">Logout Admin</button>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('smm_db')) || {};
        let payments = JSON.parse(localStorage.getItem('smm_payments')) || [];
        let orders = JSON.parse(localStorage.getItem('smm_orders')) || [];
        let sessionUser = null;

        function save() { 
            localStorage.setItem('smm_db', JSON.stringify(db));
            localStorage.setItem('smm_payments', JSON.stringify(payments));
            localStorage.setItem('smm_orders', JSON.stringify(orders));
        }

        function toggleScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function showTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
            document.getElementById(id).style.display = 'block'; el.classList.add('active-nav');
        }

        function switchAdminTab(sec, el) {
            document.getElementById('adm-users-sec').style.display = 'none';
            document.getElementById('adm-payments-sec').style.display = 'none';
            document.getElementById('adm-orders-sec').style.display = 'none';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`adm-${sec}-sec`).style.display = 'block';
            el.classList.add('active');
            if(sec === 'payments') loadAdminPayments();
            if(sec === 'orders') loadAdminOrders();
        }

        // --- Auth ---
        function doSignup() {
            let u = document.getElementById('s-user').value.trim();
            if(!u || db[u]) return alert("Invalid Username");
            db[u] = { email: document.getElementById('s-email').value, phone: document.getElementById('s-phone').value, pass: document.getElementById('s-pass').value, bal: 0 };
            save(); alert("Success!"); toggleScreen('login-screen');
        }

        function doLogin() {
            let u = document.getElementById('l-user').value.trim(), p = document.getElementById('l-pass').value;
            if(u === "admin" && p === "suhel7388") { toggleScreen('admin-panel'); loadAdminUsers(); return; }
            if(db[u] && db[u].pass === p) { sessionUser = u; updateUI(); toggleScreen('user-panel'); } else alert("Wrong!");
        }

        // --- User Actions ---
        function updateQR() {
            let a = document.getElementById('payAmount').value;
            document.getElementById('qrBox').style.display = a >= 1 ? "block" : "none";
            document.getElementById('qrImg').src = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent("upi://pay?pa=7388720012@fam&am="+a+"&cu=INR")}`;
        }

        function submitPayment() {
            let a = document.getElementById('payAmount').value, t = document.getElementById('payTxn').value;
            if(!a || !t) return alert("Details missing");
            payments.unshift({ user: sessionUser, amt: a, txn: t, date: new Date().toLocaleString() });
            save();
            window.open(`https://wa.me/917388720012?text=New Payment:%0AUser: ${sessionUser}%0AAmt: ₹${a}%0ATXN: ${t}`);
            alert("Submitted!");
        }

        function placeOrder() {
            let cost = parseFloat(document.getElementById('serviceSelect').value);
            let link = document.getElementById('orderLink').value;
            if(!link || db[sessionUser].bal < cost) return alert("Check Link/Balance");
            db[sessionUser].bal -= cost;
            orders.unshift({ user: sessionUser, srv: document.getElementById('serviceSelect').options[document.getElementById('serviceSelect').selectedIndex].text, link: link, date: new Date().toLocaleString() });
            save(); updateUI();
            window.open(`https://wa.me/917388720012?text=New Order:%0AUser: ${sessionUser}%0AService: ${orders[0].srv}%0ALink: ${link}`);
            alert("Order Placed!");
        }

        function loadUserHistory() {
            let list = document.getElementById('userHistoryList'); list.innerHTML = "<b>Orders:</b>";
            orders.filter(o => o.user === sessionUser).forEach(o => list.innerHTML += `<div style="font-size:11px; margin-top:5px; border-bottom:1px solid #eee;">${o.srv} - ${o.date}</div>`);
        }

        // --- Admin Actions ---
        function loadAdminUsers() {
            let body = document.getElementById('userTableBody'); body.innerHTML = "";
            let totalB = 0, users = Object.keys(db);
            users.forEach(u => {
                totalB += db[u].bal;
                body.innerHTML += `<tr><td>${u}</td><td>${db[u].email}<br>${db[u].phone}</td><td>₹${db[u].bal}</td><td><button class="btn-red" onclick="deleteUser('${u}')">Del</button></td></tr>`;
            });
            document.getElementById('admTotalUsers').innerText = users.length;
            document.getElementById('admTotalBal').innerText = "₹" + totalB;
        }

        function loadAdminPayments() {
            let list = document.getElementById('adminPaymentList'); list.innerHTML = "";
            payments.forEach(p => list.innerHTML += `<div class="card" style="margin:5px 0; padding:10px;"><b>${p.user}</b>: ₹${p.amt} <br>TXN: ${p.txn} <br><small>${p.date}</small></div>`);
        }

        function loadAdminOrders() {
            let list = document.getElementById('adminOrderList'); list.innerHTML = "";
            orders.forEach(o => list.innerHTML += `<div class="card" style="margin:5px 0; padding:10px;"><b>${o.user}</b>: ${o.srv} <br><small>${o.link}</small></div>`);
        }

        function deleteUser(u) { if(confirm("Delete " + u + "?")) { delete db[u]; save(); loadAdminUsers(); } }

        function adminAddBal() {
            let u = document.getElementById('admTargetUser').value, a = parseFloat(document.getElementById('admTargetAmt').value);
            if(db[u]) { db[u].bal += a; save(); loadAdminUsers(); alert("Added!"); } else alert("Not found");
        }

        function filterTable(input, tableId) {
            let val = input.value.toLowerCase();
            Array.from(document.getElementById(tableId).rows).forEach(r => r.style.display = r.innerText.toLowerCase().includes(val) ? "" : "none");
        }

        function updateUI() { 
            document.getElementById('userBalDisplay').innerText = "₹" + db[sessionUser].bal;
            document.getElementById('displayUser').innerText = sessionUser;
        }
    </script>
</body>
</html>
